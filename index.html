<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Planner</title>
  <link rel="preconnect" href="https://script.google.com" />
  <link rel="preconnect" href="https://script.googleusercontent.com" />

  <style>

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-muted: #f3f4f6;
      --text: #111827;
      --muted: #6b7280;
      --muted-2: #9ca3af;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #eff6ff;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --success: #16a34a;
      --success-soft: #f0fdf4;
      --warning: #d97706;
      --warning-soft: #fffbeb;
      --holiday: #db2777;
      --holiday-soft: #fdf2f8;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --shadow-soft: 0 2px 10px rgba(15, 23, 42, 0.05);
      --radius: 14px;
      --radius-sm: 10px;
      --sidebar-width: 430px;
      --layout-gap: 18px;
      --page-pad: 20px;
      --right-pane-offset: calc(var(--sidebar-width) + var(--layout-gap) + var(--page-pad));
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(37, 99, 235, 0.32);
      outline-offset: 2px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      margin-left: var(--right-pane-offset);
      width: calc(100% - var(--right-pane-offset));
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    header::before,
    .brand::before,
    .activity-sidebar::before,
    .month::before,
    .modal::before {
      display: none;
    }

    .header-inner {
      max-width: none;
      margin: 0;
      padding: 10px 64px 10px 0;
      display: grid;
      gap: 10px;
      position: relative;
    }

    .header-top {
      display: grid;
      grid-template-columns: minmax(220px, 320px) minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .brand {
      min-width: 0;
      padding-left: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .ribbon-toggle {
      position: absolute;
      top: 8px;
      right: 20px;
      z-index: 3;
      width: 36px;
      height: 36px;
      min-height: 36px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      font-size: 0;
      line-height: 1;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: var(--shadow-soft);
      transition: background 0.14s ease, border-color 0.14s ease, color 0.14s ease, box-shadow 0.14s ease;
    }

    .ribbon-toggle::before,
    .ribbon-toggle::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 11px;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      transition: transform 0.18s ease;
    }

    header.header-collapsed .ribbon-toggle::before {
      transform: translate(-8px, -50%) rotate(45deg);
    }

    header.header-collapsed .ribbon-toggle::after {
      transform: translate(-2px, -50%) rotate(-45deg);
    }

    header:not(.header-collapsed) .ribbon-toggle::before {
      transform: translate(-8px, -50%) rotate(-45deg);
    }

    header:not(.header-collapsed) .ribbon-toggle::after {
      transform: translate(-2px, -50%) rotate(45deg);
    }

    .ribbon-toggle:hover {
      background: var(--text);
      border-color: var(--text);
      color: #ffffff;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.14);
    }

    header.header-collapsed .controls,
    header.header-collapsed .header-meta {
      display: none;
    }

    header.header-collapsed .header-inner {
      padding-top: 8px;
      padding-bottom: 8px;
      gap: 0;
    }

    header.header-collapsed .ribbon-toggle {
      top: 8px;
    }

    header.header-collapsed .header-top {
      grid-template-columns: 1fr;
    }

    header h1 {
      margin: 0;
      font-size: clamp(18px, 1.4vw, 22px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text);
      font-weight: 700;
    }

    .subtitle {
      display: none;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .controls button,
    .controls input,
    .modal-actions button,
    .add-activity-btn,
    .backlog-add-btn,
    .backlog-note-actions button,
    .pending-complete-btn,
    .completion-toggle {
      min-height: 36px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: none;
      transition: background 0.14s ease, border-color 0.14s ease, color 0.14s ease;
    }

    .controls button:hover,
    .modal-actions button:hover,
    .add-activity-btn:hover,
    .backlog-add-btn:hover,
    .backlog-note-actions button:hover,
    .pending-complete-btn:hover,
    .completion-toggle:hover {
      background: var(--surface-muted);
      border-color: var(--border-strong);
      transform: none;
      box-shadow: none;
    }

    .controls button:disabled,
    .modal-actions button:disabled,
    .add-activity-btn:disabled,
    .backlog-add-btn:disabled,
    .backlog-note-actions button:disabled,
    .pending-complete-btn:disabled,
    .remove-activity-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .controls button.range-active,
    .save-btn,
    .add-activity-btn,
    .backlog-add-btn,
    #printButton {
      background: var(--text);
      color: #ffffff;
      border-color: var(--text);
    }

    .controls button.range-active:hover,
    .save-btn:hover,
    .add-activity-btn:hover,
    .backlog-add-btn:hover,
    #printButton:hover {
      background: #374151;
      border-color: #374151;
    }

    #thisYearButton,
    #reloadButton {
      background: var(--surface);
    }

    .controls input {
      background: var(--surface);
      color: var(--text);
      cursor: text;
    }

    .controls input[type="number"] {
      width: 86px;
      text-align: center;
      font-weight: 600;
    }

    .search-input {
      width: min(280px, 28vw);
      padding-left: 12px !important;
    }

    .header-meta {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .status {
      min-height: 28px;
      margin: 0;
      display: flex;
      align-items: center;
      padding: 4px 10px;
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      background: transparent;
    }

    .status.success {
      color: #166534;
      background: var(--success-soft);
      border-color: #bbf7d0;
    }

    .status.error {
      color: #991b1b;
      background: var(--danger-soft);
      border-color: #fecaca;
    }

    .status.warning {
      color: #92400e;
      background: var(--warning-soft);
      border-color: #fde68a;
    }

    .legend {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
    }

    .legend-swatch {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--muted-2);
    }

    .legend-swatch.today-swatch { background: var(--primary); }
    .legend-swatch.past-swatch { background: var(--muted-2); }
    .legend-swatch.range-swatch { background: var(--primary); }
    .legend-swatch.search-swatch { background: var(--warning); }
    .legend-swatch.holiday-swatch { background: var(--holiday); }

    main {
      max-width: none;
      margin: 0;
      padding: 20px 32px 20px var(--right-pane-offset);
    }

    .planner-layout {
      display: block;
    }

    .activity-sidebar {
      position: fixed;
      top: var(--page-pad);
      left: var(--page-pad);
      bottom: var(--page-pad);
      width: var(--sidebar-width);
      max-height: none;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-soft);
      z-index: 60;
    }

    .activity-sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .activity-sidebar h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: -0.01em;
      color: var(--text);
      font-weight: 700;
    }

    .activity-sidebar-help,
    .modal-help {
      display: none;
    }

    .pending-count,
    .backlog-count,
    .month-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--surface-muted);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
    }

    .pending-activity-list,
    .backlog-note-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pending-activity-empty,
    .backlog-note-empty,
    .loading-message {
      padding: 14px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .pending-activity-card,
    .backlog-note-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      text-align: left;
      box-shadow: none;
    }

    .pending-activity-card:hover,
    .backlog-note-card:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-soft);
      transform: none;
    }

    .pending-activity-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .pending-activity-open {
      width: 100%;
      min-height: 24px;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .pending-activity-open:hover {
      color: var(--primary);
    }

    .pending-complete-btn {
      width: 32px;
      height: 32px;
      min-height: 32px;
      padding: 0;
      border-radius: 8px;
      border-color: #bbf7d0;
      background: var(--surface);
      color: #166534;
      font-size: 0;
      white-space: nowrap;
      position: relative;
      flex: 0 0 32px;
    }

    .pending-complete-btn::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 16px;
      border: 2px solid #86efac;
      border-radius: 4px;
      background: #ffffff;
      transform: translate(-50%, -50%);
    }

    .pending-complete-btn:hover {
      background: var(--success-soft);
      border-color: #86efac;
    }

    .pending-complete-btn:disabled::before {
      border-color: var(--border-strong);
      background: var(--surface-muted);
    }

    .pending-activity-title,
    .backlog-note-text {
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .pending-activity-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pending-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--muted);
    }

    .pending-pill.active { color: #166534; background: var(--success-soft); border-color: #bbf7d0; }
    .pending-pill.upcoming { color: var(--primary-dark); background: var(--primary-soft); border-color: #bfdbfe; }
    .pending-pill.due-today { color: #92400e; background: var(--warning-soft); border-color: #fde68a; }
    .pending-pill.overdue { color: #991b1b; background: var(--danger-soft); border-color: #fecaca; }

    .pending-activity-remaining,
    .pending-activity-dates,
    .pending-activity-duration,
    .backlog-note-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .sidebar-divider {
      height: 1px;
      margin: 14px 0;
      background: var(--border);
    }

    .backlog-form {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      box-shadow: none;
    }

    .backlog-note-input {
      width: 100%;
      min-height: 70px;
      resize: vertical;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      line-height: 1.4;
    }

    .backlog-note-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
    }

    .backlog-note-actions button {
      min-height: 30px;
      padding: 5px 8px;
      font-size: 12px;
    }

    .backlog-schedule-btn {
      color: #166534 !important;
      border-color: #bbf7d0 !important;
      background: var(--success-soft) !important;
    }

    .backlog-delete-btn {
      color: #991b1b !important;
      border-color: #fecaca !important;
      background: var(--danger-soft) !important;
    }

    .year-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }

    .month {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      scroll-margin-top: 82px;
    }

    .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 10px;
    }

    .month h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--text);
      font-weight: 700;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      text-align: center;
    }

    .weekdays {
      gap: 4px;
      margin-bottom: 4px;
    }

    .weekdays div {
      padding: 6px 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .days {
      gap: 4px;
    }

    .day {
      min-height: 130px;
      padding: 26px 6px 26px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.14s ease, border-color 0.14s ease;
    }

    .day:hover {
      background: var(--primary-soft);
      border-color: #bfdbfe;
      z-index: 2;
    }

    .day:active {
      transform: none;
    }

    .day.empty {
      background: var(--surface-muted);
      border-color: var(--border);
      cursor: default;
      pointer-events: none;
      box-shadow: none;
    }

    .past-date {
      background: #f9fafb;
      color: var(--muted-2);
    }

    .past-date:hover {
      background: #f3f4f6;
    }

    .today {
      background: var(--primary-soft);
      border: 2px solid var(--primary);
      color: var(--text);
    }

    .day.range-start-selected,
    .day.range-preview {
      background: var(--primary-soft);
      border-color: var(--primary);
    }

    .day.range-start-selected {
      box-shadow: inset 0 0 0 1px var(--primary);
    }

    .past-date.range-start-selected,
    .past-date.range-preview,
    .today.range-start-selected,
    .today.range-preview {
      color: var(--text);
    }

    .day.holiday-date {
      border: 1px solid #fbcfe8;
      box-shadow: none;
    }

    .day.holiday-date:not(.today):not(.range-preview):not(.range-start-selected) {
      background: var(--holiday-soft);
    }

    .past-date.holiday-date:not(.range-preview):not(.range-start-selected) {
      background: #fdf2f8;
    }

    .holiday-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      max-width: calc(100% - 34px);
      height: 17px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ffffff;
      color: var(--holiday);
      border: 1px solid #fbcfe8;
      font-size: 9px;
      font-weight: 700;
      line-height: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
      z-index: 6;
    }

    .day.search-dim {
      opacity: 0.35;
    }

    .day.search-match {
      opacity: 1;
      border-color: var(--warning);
      box-shadow: inset 0 0 0 1px var(--warning);
    }

    .date-number {
      position: absolute;
      top: 5px;
      right: 6px;
      min-width: 22px;
      height: 22px;
      line-height: 22px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      z-index: 7;
    }

    .today .date-number {
      background: var(--primary);
      color: #ffffff;
    }

    .activity-bar {
      position: absolute;
      left: 0;
      right: 0;
      height: 14px;
      padding: 0 7px;
      color: #ffffff;
      border-radius: 0;
      font-size: 10px;
      font-weight: 600;
      line-height: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
      z-index: 2;
      box-shadow: none;
    }

    .bar-color-0 { background: #2563eb; }
    .bar-color-1 { background: #16a34a; }
    .bar-color-2 { background: #d97706; }
    .bar-color-3 { background: #7c3aed; }
    .bar-color-4 { background: #dc2626; }
    .bar-color-5 { background: #0891b2; }

    .activity-bar.segment-start {
      left: 0;
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

    .activity-bar.segment-end {
      right: 0;
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }

    .activity-bar.segment-single {
      left: 0;
      right: 0;
      border-radius: 0;
    }

    .activity-bar.completed-activity-bar {
      background: var(--muted-2);
      color: #ffffff;
      text-decoration: line-through;
      opacity: 0.78;
    }

    .more-indicator {
      position: absolute;
      left: 5px;
      right: 5px;
      bottom: 5px;
      height: 17px;
      padding: 0 6px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      line-height: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      z-index: 4;
      box-shadow: none;
    }

    .more-indicator:hover {
      background: var(--surface-muted);
      border-color: var(--border-strong);
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(17, 24, 39, 0.42);
      padding: 20px;
      z-index: 999;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .modal-bg[hidden] {
      display: none;
    }

    .modal {
      position: relative;
      width: min(1040px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.20);
    }

    .modal h3 {
      margin: 0 0 14px;
      font-size: 20px;
      letter-spacing: -0.02em;
      color: var(--text);
      font-weight: 700;
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .activity-list:empty::before {
      content: "No activities.";
      display: block;
      padding: 14px;
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    .activity-row {
      display: grid;
      grid-template-columns: 32px minmax(90px, 0.7fr) minmax(200px, 1.7fr) minmax(140px, 1fr) minmax(140px, 1fr) minmax(80px, 0.55fr) 38px;
      gap: 8px;
      align-items: end;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .activity-row.completed-activity {
      background: #f9fafb;
      opacity: 0.88;
    }

    .activity-row.completed-activity .activity-title-input {
      color: var(--muted);
      text-decoration: line-through;
    }

    .activity-number {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .completion-group label,
    .field-group label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .completion-toggle {
      width: 100%;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
    }

    .completion-toggle::before {
      content: "";
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--border-strong);
      border-radius: 4px;
      background: var(--surface);
      flex: 0 0 auto;
    }

    .completion-toggle.is-completed {
      background: var(--success-soft);
      color: #166534;
      border-color: #bbf7d0;
    }

    .completion-toggle.is-completed::before {
      content: "✓";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #166534;
      border-color: var(--success);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .field-group input {
      width: 100%;
      min-height: 36px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
    }

    .field-group input:focus {
      border-color: var(--primary);
    }

    .activity-duration-value {
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .activity-duration-value.invalid-duration {
      color: #991b1b;
      background: var(--danger-soft);
      border-color: #fecaca;
    }

    .row-error {
      grid-column: 2 / -1;
      margin-top: -2px;
      color: #991b1b;
      font-size: 12px;
      font-weight: 600;
      display: none;
    }

    .activity-row.has-error {
      border-color: #fecaca;
      background: var(--danger-soft);
    }

    .activity-row.has-error .row-error {
      display: block;
    }

    .remove-activity-btn {
      width: 36px;
      height: 36px;
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      background: var(--danger-soft);
      color: #991b1b;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      font-weight: 600;
    }

    .remove-activity-btn:hover {
      background: #fee2e2;
      transform: none;
    }

    .add-activity-btn {
      margin-top: 12px;
      min-height: 38px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .modal-actions button {
      min-height: 38px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
    }

    .close-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

<body>
  <header id="plannerHeader" class="header-collapsed">
    <div class="header-inner">
      <div class="header-top">
        <div class="brand">
          <h1>Planner</h1>
          <button type="button" id="plannerToolsToggle" class="ribbon-toggle" aria-label="Show tools" aria-expanded="false" aria-controls="plannerControls plannerMeta"></button>
          <p class="subtitle"></p>
        </div>

        <div class="controls" id="plannerControls" aria-label="Calendar controls">
          <button type="button" id="prevYearButton" aria-label="Previous year">Prev</button>
          <input type="number" id="yearInput" min="1900" max="9999" aria-label="Year" />
          <button type="button" id="nextYearButton" aria-label="Next year">Next</button>
          <button type="button" id="thisYearButton">Today</button>
          <button type="button" id="rangeSelectButton">Range</button>
          <button type="button" id="reloadButton">Sync</button>
          <button type="button" id="printButton">Print</button>
          <input type="search" id="activitySearchInput" class="search-input" placeholder="Search activities" aria-label="Search activities" />
          <button type="button" id="clearSearchButton">Reset</button>
        </div>
      </div>

      <div class="header-meta" id="plannerMeta">
        <div id="status" class="status" role="status" aria-live="polite">Ready</div>

        <div class="legend" aria-label="Calendar legend">
          <span class="legend-item"><span class="legend-swatch today-swatch"></span>Today</span>
          <span class="legend-item"><span class="legend-swatch past-swatch"></span>Past</span>
          <span class="legend-item"><span class="legend-swatch range-swatch"></span>Range</span>
          <span class="legend-item"><span class="legend-swatch search-swatch"></span>Search</span>
          <span class="legend-item"><span class="legend-swatch holiday-swatch"></span>Holiday</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="planner-layout">
      <aside class="activity-sidebar" aria-labelledby="pendingActivitiesTitle">
        <div class="activity-sidebar-header">
          <h2 id="pendingActivitiesTitle">Open</h2>
          <span id="pendingActivityCount" class="pending-count">0</span>
        </div>
        <p class="activity-sidebar-help"></p>
        <div id="pendingActivityList" class="pending-activity-list" aria-live="polite"></div>

        <div class="sidebar-divider" aria-hidden="true"></div>

        <section class="backlog-section" aria-labelledby="backlogNotesTitle">
          <div class="activity-sidebar-header backlog-header">
            <h2 id="backlogNotesTitle">Notes</h2>
            <span id="backlogNoteCount" class="backlog-count">0</span>
          </div>
          <p class="activity-sidebar-help"></p>
          <div class="backlog-form">
            <textarea id="backlogNoteInput" class="backlog-note-input" rows="3" placeholder="Add note" aria-label="Unscheduled work note"></textarea>
            <button type="button" id="addBacklogNoteButton" class="backlog-add-btn">Add</button>
          </div>
          <div id="backlogNoteList" class="backlog-note-list" aria-live="polite"></div>
        </section>
      </aside>

      <div id="calendar" class="year-grid" aria-live="polite"></div>
    </div>
  </main>

  <div class="modal-bg" id="modalBg" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalDate" aria-describedby="modalHelp">
      <h3 id="modalDate"></h3>

      <p class="modal-help" id="modalHelp">
        
      </p>

      <div id="activityList" class="activity-list"></div>

      <button type="button" class="add-activity-btn" id="addActivityButton">Add Activity</button>

      <div class="modal-actions">
        <button type="button" class="close-btn" id="cancelButton">Cancel</button>
        <button type="button" class="save-btn" id="saveButton">Save</button>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwHUmxDQ6GaMJWKRTrxcin5g-UrrwKIOodInRKKnoCpbINW6_gCq0eSDSxQO7R8eizIyg/exec";

    const monthNames = [

    const weekdayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    const calendar = document.getElementById("calendar");
    const pendingActivityList = document.getElementById("pendingActivityList");
    const pendingActivityCount = document.getElementById("pendingActivityCount");
    const backlogNoteInput = document.getElementById("backlogNoteInput");
    const addBacklogNoteButton = document.getElementById("addBacklogNoteButton");
    const backlogNoteList = document.getElementById("backlogNoteList");
    const backlogNoteCount = document.getElementById("backlogNoteCount");
