<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Full Year Schedule Planner</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls button,
    .controls input {
      padding: 8px 12px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
    }

    .controls button {
      background: white;
      cursor: pointer;
    }

    .controls input {
      width: 100px;
      text-align: center;
    }

    .status {
      margin: 12px auto 0;
      max-width: 900px;
      min-height: 20px;
      font-size: 13px;
      line-height: 1.4;
      color: #e5e7eb;
    }

    .status.success {
      color: #bbf7d0;
    }

    .status.error {
      color: #fecaca;
    }

    main {
      padding: 20px;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .loading-message {
      grid-column: 1 / -1;
      background: white;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .month {
      background: white;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .month h2 {
      text-align: center;
      margin: 0 0 10px;
      font-size: 20px;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .weekdays div {
      font-weight: bold;
      font-size: 12px;
      padding: 5px 0;
      color: #555;
    }

    .day {
      min-height: 48px;
      padding: 5px;
      border: 1px solid #eee;
      font-size: 13px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .day:hover {
      background: #f0f0f0;
    }

    .empty {
      background: #fafafa;
      cursor: default;
    }

    .past-date {
      background: #e5e5e5;
      color: #777;
    }

    .past-date:hover {
      background: #dcdcdc;
    }

    .past-date .note-preview {
      color: #666;
    }

    .today {
      background: #fff3cd;
      border: 2px solid #d39e00;
      color: #222;
    }

    .date-number {
      font-weight: bold;
      display: block;
      margin-bottom: 3px;
    }

    .note-preview {
      display: block;
      font-size: 10px;
      color: #0056b3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .has-note::after {
      content: "";
      width: 6px;
      height: 6px;
      background: #007bff;
      border-radius: 50%;
      position: absolute;
      top: 4px;
      right: 4px;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal {
      background: white;
      width: 90%;
      max-width: 420px;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 3px 15px rgba(0, 0, 0, 0.25);
    }

    .modal h3 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 10px;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .modal-actions button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .modal-actions button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .save-btn {
      background: #007bff;
      color: white;
    }

    .delete-btn {
      background: #dc3545;
      color: white;
    }

    .close-btn {
      background: #ddd;
    }

    @media (max-width: 1100px) {
      .year-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 800px) {
      .year-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .year-grid {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      header,
      .modal-bg {
        display: none;
      }

      body {
        background: white;
      }

      main {
        padding: 0;
      }

      .year-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .month {
        box-shadow: none;
        border: 1px solid #ccc;
        page-break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Full Year Schedule Planner</h1>

    <div class="controls">
      <button type="button" id="prevYearButton">Previous Year</button>
      <input type="number" id="yearInput" />
      <button type="button" id="nextYearButton">Next Year</button>
      <button type="button" id="thisYearButton">This Year</button>
      <button type="button" id="reloadButton">Reload</button>
      <button type="button" id="printButton">Print</button>
    </div>

    <div id="status" class="status">Opening planner...</div>
  </header>

  <main>
    <div id="calendar" class="year-grid"></div>
  </main>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalDate"></h3>

      <textarea id="noteInput" placeholder="Write schedule or plan here..."></textarea>

      <div class="modal-actions">
        <button type="button" class="delete-btn" id="deleteButton">Delete</button>
        <button type="button" class="close-btn" id="cancelButton">Cancel</button>
        <button type="button" class="save-btn" id="saveButton">Save</button>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwHUmxDQ6GaMJWKRTrxcin5g-UrrwKIOodInRKKnoCpbINW6_gCq0eSDSxQO7R8eizIyg/exec";

    const monthNames = [
      "January", "February", "March", "April",
      "May", "June", "July", "August",
      "September", "October", "November", "December"
    ];

    const weekdayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    const calendar = document.getElementById("calendar");
    const yearInput = document.getElementById("yearInput");
    const statusBox = document.getElementById("status");

    const modalBg = document.getElementById("modalBg");
    const modalDate = document.getElementById("modalDate");
    const noteInput = document.getElementById("noteInput");

    const saveButton = document.getElementById("saveButton");
    const deleteButton = document.getElementById("deleteButton");
    const cancelButton = document.getElementById("cancelButton");

    let currentYear = new Date().getFullYear();
    let selectedDateKey = "";
    let notesByDate = {};
    let notesCacheByYear = {};
    let dateCellByKey = {};
    let isBusy = false;

    yearInput.value = currentYear;

    document.getElementById("prevYearButton").addEventListener("click", function () {
      changeYear(-1);
    });

    document.getElementById("nextYearButton").addEventListener("click", function () {
      changeYear(1);
    });

    document.getElementById("thisYearButton").addEventListener("click", function () {
      goToCurrentYear();
    });

    document.getElementById("reloadButton").addEventListener("click", function () {
      loadNotesForYear(currentYear, true);
    });

    document.getElementById("printButton").addEventListener("click", function () {
      window.print();
    });

    saveButton.addEventListener("click", function () {
      saveNote();
    });

    deleteButton.addEventListener("click", function () {
      deleteNote();
    });

    cancelButton.addEventListener("click", function () {
      closeModal();
    });

    yearInput.addEventListener("change", function () {
      const nextYear = Number(yearInput.value);

      if (!Number.isInteger(nextYear) || nextYear < 1900 || nextYear > 9999) {
        setStatus("Please enter a valid year.", "error");
        yearInput.value = currentYear;
        return;
      }

      currentYear = nextYear;
      loadNotesForYear(currentYear, false);
    });

    modalBg.addEventListener("click", function (event) {
      if (event.target === modalBg && !isBusy) {
        closeModal();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && modalBg.style.display === "flex" && !isBusy) {
        closeModal();
      }

      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
        if (modalBg.style.display === "flex") {
          event.preventDefault();
          saveNote();
        }
      }
    });

    function loadNotesForYear(year, forceReload) {
      if (!forceReload && notesCacheByYear[year]) {
        notesByDate = Object.assign({}, notesCacheByYear[year]);
        renderCalendar(year);
        setStatus("Loaded from memory. Fast mode.", "success");
        return Promise.resolve(notesByDate);
      }

      calendar.innerHTML = '<div class="loading-message">Loading notes...</div>';
      setStatus("Loading notes from Google Sheet...");

      return callAppsScript("getNotesForYear", { year: year })
        .then(function (response) {
          notesByDate = response.data || {};
          notesCacheByYear[year] = Object.assign({}, notesByDate);

          renderCalendar(year);

          const count = Object.keys(notesByDate).length;
          setStatus("Loaded from Google Sheet. Notes found: " + count, "success");

          return notesByDate;
        })
        .catch(function (error) {
          notesByDate = {};
          renderCalendar(year);
          setStatus(error.message, "error");
          return null;
        });
    }

    function renderCalendar(year) {
      calendar.innerHTML = "";
      dateCellByKey = {};

      const fragment = document.createDocumentFragment();

      for (let month = 0; month < 12; month++) {
        const monthBox = document.createElement("div");
        monthBox.className = "month";

        const title = document.createElement("h2");
        title.textContent = monthNames[month];
        monthBox.appendChild(title);

        const weekdays = document.createElement("div");
        weekdays.className = "weekdays";

        weekdayNames.forEach(function (dayName) {
          const weekday = document.createElement("div");
          weekday.textContent = dayName;
          weekdays.appendChild(weekday);
        });

        monthBox.appendChild(weekdays);

        const daysGrid = document.createElement("div");
        daysGrid.className = "days";

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
          const emptyCell = document.createElement("div");
          emptyCell.className = "day empty";
          daysGrid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
          const dateCell = document.createElement("div");
          dateCell.className = "day";

          const dateKey = createDateKey(year, month, day);
          const savedNote = notesByDate[dateKey] || "";

          dateCell.dataset.dateKey = dateKey;
          dateCellByKey[dateKey] = dateCell;

          const today = new Date();
          today.setHours(0, 0, 0, 0);

          const cellDate = new Date(year, month, day);
          cellDate.setHours(0, 0, 0, 0);

          const isToday = cellDate.getTime() === today.getTime();
          const isPastDate = cellDate.getTime() < today.getTime();

          if (isPastDate) {
            dateCell.classList.add("past-date");
          }

          if (isToday) {
            dateCell.classList.add("today");
          }

          if (savedNote) {
            dateCell.classList.add("has-note");
          }

          const dateNumber = document.createElement("span");
          dateNumber.className = "date-number";
          dateNumber.textContent = String(day);
          dateCell.appendChild(dateNumber);

          if (savedNote) {
            const preview = document.createElement("span");
            preview.className = "note-preview";
            preview.textContent = savedNote;
            dateCell.appendChild(preview);
          }

          dateCell.addEventListener("click", function () {
            openModal(year, month, day);
          });

          daysGrid.appendChild(dateCell);
        }

        monthBox.appendChild(daysGrid);
        fragment.appendChild(monthBox);
      }

      calendar.appendChild(fragment);
    }

    function updateOneDateCell(dateKey) {
      const dateCell = dateCellByKey[dateKey];

      if (!dateCell) {
        renderCalendar(currentYear);
        return;
      }

      const note = notesByDate[dateKey] || "";

      dateCell.classList.toggle("has-note", note !== "");

      const oldPreview = dateCell.querySelector(".note-preview");

      if (oldPreview) {
        oldPreview.remove();
      }

      if (note) {
        const preview = document.createElement("span");
        preview.className = "note-preview";
        preview.textContent = note;
        dateCell.appendChild(preview);
      }
    }

    function createDateKey(year, month, day) {
      const monthNumber = String(month + 1).padStart(2, "0");
      const dayNumber = String(day).padStart(2, "0");
      return String(year) + "-" + monthNumber + "-" + dayNumber;
    }

    function openModal(year, month, day) {
      selectedDateKey = createDateKey(year, month, day);
      modalDate.textContent = day + " " + monthNames[month] + " " + year;
      noteInput.value = notesByDate[selectedDateKey] || "";
      modalBg.style.display = "flex";
      noteInput.focus();
    }

    function closeModal() {
      modalBg.style.display = "none";
      selectedDateKey = "";
      noteInput.value = "";
      isBusy = false;

      saveButton.disabled = false;
      deleteButton.disabled = false;
      cancelButton.disabled = false;

      saveButton.textContent = "Save";
      deleteButton.textContent = "Delete";
    }

    function saveNote() {
      if (!selectedDateKey || isBusy) {
        return;
      }

      const dateKeyToSave = selectedDateKey;
      const note = noteInput.value.trim();

      isBusy = true;
      saveButton.disabled = true;
      deleteButton.disabled = true;
      cancelButton.disabled = true;
      saveButton.textContent = "Saving...";

      setStatus("Saving to Google Sheet...");

      callAppsScript("saveNote", {
        dateKey: dateKeyToSave,
        note: note
      })
        .then(function () {
          if (note) {
            notesByDate[dateKeyToSave] = note;
          } else {
            delete notesByDate[dateKeyToSave];
          }

          notesCacheByYear[currentYear] = Object.assign({}, notesByDate);

          closeModal();
          updateOneDateCell(dateKeyToSave);

          setStatus("Saved. Calendar updated without full reload.", "success");
        })
        .catch(function (error) {
          isBusy = false;
          saveButton.disabled = false;
          deleteButton.disabled = false;
          cancelButton.disabled = false;
          saveButton.textContent = "Save";

          setStatus(error.message, "error");
        });
    }

    function deleteNote() {
      if (!selectedDateKey || isBusy) {
        return;
      }

      const dateKeyToDelete = selectedDateKey;

      isBusy = true;
      saveButton.disabled = true;
      deleteButton.disabled = true;
      cancelButton.disabled = true;
      deleteButton.textContent = "Deleting...";

      setStatus("Deleting from Google Sheet...");

      callAppsScript("deleteNote", {
        dateKey: dateKeyToDelete
      })
        .then(function () {
          delete notesByDate[dateKeyToDelete];

          notesCacheByYear[currentYear] = Object.assign({}, notesByDate);

          closeModal();
          updateOneDateCell(dateKeyToDelete);

          setStatus("Deleted. Calendar updated without full reload.", "success");
        })
        .catch(function (error) {
          isBusy = false;
          saveButton.disabled = false;
          deleteButton.disabled = false;
          cancelButton.disabled = false;
          deleteButton.textContent = "Delete";

          setStatus(error.message, "error");
        });
    }

    function changeYear(amount) {
      currentYear += amount;
      yearInput.value = currentYear;
      loadNotesForYear(currentYear, false);
    }

    function goToCurrentYear() {
      currentYear = new Date().getFullYear();
      yearInput.value = currentYear;
      loadNotesForYear(currentYear, false);
    }

    function setStatus(message, type) {
      statusBox.textContent = message || "";
      statusBox.className = "status";

      if (type) {
        statusBox.classList.add(type);
      }
    }

    function callAppsScript(action, params) {
      return new Promise(function (resolve, reject) {
        const callbackName =
          "jsonpCallback_" +
          Date.now() +
          "_" +
          Math.random().toString(36).slice(2);

        const url = new URL(APPS_SCRIPT_URL);
        url.searchParams.set("action", action);
        url.searchParams.set("callback", callbackName);
        url.searchParams.set("_cacheBust", String(Date.now()));

        Object.keys(params || {}).forEach(function (key) {
          url.searchParams.set(key, params[key]);
        });

        const timeout = window.setTimeout(function () {
          cleanup();

          reject(new Error(
            "Apps Script did not respond within 20 seconds. Please check deployment URL, access permission, or backend error."
          ));
        }, 20000);

        window[callbackName] = function (payload) {
          cleanup();

          if (!payload || payload.ok !== true) {
            const message =
              payload && payload.error
                ? payload.error
                : "Apps Script returned an error.";
            reject(new Error(message));
            return;
          }

          resolve(payload);
        };

        const script = document.createElement("script");
        script.src = url.toString();

        script.onerror = function () {
          cleanup();

          reject(new Error(
            "Browser could not load Apps Script. Please check your /exec URL and deployment permission."
          ));
        };

        document.body.appendChild(script);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    loadNotesForYear(currentYear, false);
  </script>
</body>
</html>
