<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Year Schedule Planner</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .controls button,
    .controls input {
      padding: 8px 12px;
      font-size: 15px;
      border: none;
      border-radius: 6px;
    }

    .controls button {
      background: white;
      cursor: pointer;
    }

    .controls input {
      width: 100px;
      text-align: center;
    }

    main {
      padding: 20px;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .month {
      background: white;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    .month h2 {
      text-align: center;
      margin: 0 0 10px;
      font-size: 20px;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
    }

    .weekdays div {
      font-weight: bold;
      font-size: 12px;
      padding: 5px 0;
      color: #555;
    }

    .day {
      min-height: 45px;
      padding: 5px;
      border: 1px solid #eee;
      font-size: 13px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .day:hover {
      background: #f0f0f0;
    }

    .empty {
      background: #fafafa;
      cursor: default;
    }

    .today {
      background: #fff3cd;
      border: 2px solid #d39e00;
    }

    .date-number {
      font-weight: bold;
      display: block;
      margin-bottom: 3px;
    }

    .note-preview {
      display: block;
      font-size: 10px;
      color: #0056b3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .has-note::after {
      content: "";
      width: 6px;
      height: 6px;
      background: #007bff;
      border-radius: 50%;
      position: absolute;
      top: 4px;
      right: 4px;
    }

    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .modal {
      background: white;
      width: 90%;
      max-width: 420px;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 3px 15px rgba(0, 0, 0, 0.25);
    }

    .modal h3 {
      margin-top: 0;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 10px;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    .modal-actions button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .save-btn {
      background: #007bff;
      color: white;
    }

    .delete-btn {
      background: #dc3545;
      color: white;
    }

    .close-btn {
      background: #ddd;
    }

    @media (max-width: 1100px) {
      .year-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 800px) {
      .year-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .year-grid {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      header,
      .modal-bg {
        display: none;
      }

      body {
        background: white;
      }

      main {
        padding: 0;
      }

      .year-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .month {
        box-shadow: none;
        border: 1px solid #ccc;
        page-break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Full Year Schedule Planner</h1>

    <div class="controls">
      <button onclick="changeYear(-1)">Previous Year</button>
      <input type="number" id="yearInput" />
      <button onclick="changeYear(1)">Next Year</button>
      <button onclick="goToCurrentYear()">This Year</button>
      <button onclick="window.print()">Print</button>
    </div>
  </header>

  <main>
    <div id="calendar" class="year-grid"></div>
  </main>

  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3 id="modalDate"></h3>

      <textarea id="noteInput" placeholder="Write schedule or plan here..."></textarea>

      <div class="modal-actions">
        <button class="delete-btn" onclick="deleteNote()">Delete</button>
        <button class="close-btn" onclick="closeModal()">Cancel</button>
        <button class="save-btn" onclick="saveNote()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const monthNames = [
      "January", "February", "March", "April",
      "May", "June", "July", "August",
      "September", "October", "November", "December"
    ];

    const weekdayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    const calendar = document.getElementById("calendar");
    const yearInput = document.getElementById("yearInput");

    const modalBg = document.getElementById("modalBg");
    const modalDate = document.getElementById("modalDate");
    const noteInput = document.getElementById("noteInput");

    let currentYear = new Date().getFullYear();
    let selectedDateKey = "";

    yearInput.value = currentYear;

    yearInput.addEventListener("change", function () {
      currentYear = Number(yearInput.value);
      renderCalendar(currentYear);
    });

    function renderCalendar(year) {
      calendar.innerHTML = "";

      for (let month = 0; month < 12; month++) {
        const monthBox = document.createElement("div");
        monthBox.className = "month";

        const title = document.createElement("h2");
        title.textContent = monthNames[month];
        monthBox.appendChild(title);

        const weekdays = document.createElement("div");
        weekdays.className = "weekdays";

        weekdayNames.forEach(day => {
          const weekday = document.createElement("div");
          weekday.textContent = day;
          weekdays.appendChild(weekday);
        });

        monthBox.appendChild(weekdays);

        const daysGrid = document.createElement("div");
        daysGrid.className = "days";

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
          const emptyCell = document.createElement("div");
          emptyCell.className = "day empty";
          daysGrid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
          const dateCell = document.createElement("div");
          dateCell.className = "day";

          const dateKey = createDateKey(year, month, day);
          const savedNote = localStorage.getItem(dateKey);

          const today = new Date();
          const isToday =
            year === today.getFullYear() &&
            month === today.getMonth() &&
            day === today.getDate();

          if (isToday) {
            dateCell.classList.add("today");
          }

          if (savedNote) {
            dateCell.classList.add("has-note");
          }

          dateCell.innerHTML = `
            <span class="date-number">${day}</span>
            ${savedNote ? `<span class="note-preview">${savedNote}</span>` : ""}
          `;

          dateCell.onclick = function () {
            openModal(year, month, day);
          };

          daysGrid.appendChild(dateCell);
        }

        monthBox.appendChild(daysGrid);
        calendar.appendChild(monthBox);
      }
    }

    function createDateKey(year, month, day) {
      const monthNumber = String(month + 1).padStart(2, "0");
      const dayNumber = String(day).padStart(2, "0");
      return `schedule-${year}-${monthNumber}-${dayNumber}`;
    }

    function openModal(year, month, day) {
      selectedDateKey = createDateKey(year, month, day);

      modalDate.textContent = `${day} ${monthNames[month]} ${year}`;
      noteInput.value = localStorage.getItem(selectedDateKey) || "";

      modalBg.style.display = "flex";
      noteInput.focus();
    }

    function closeModal() {
      modalBg.style.display = "none";
      selectedDateKey = "";
      noteInput.value = "";
    }

    function saveNote() {
      const note = noteInput.value.trim();

      if (note) {
        localStorage.setItem(selectedDateKey, note);
      } else {
        localStorage.removeItem(selectedDateKey);
      }

      closeModal();
      renderCalendar(currentYear);
    }

    function deleteNote() {
      localStorage.removeItem(selectedDateKey);
      closeModal();
      renderCalendar(currentYear);
    }

    function changeYear(amount) {
      currentYear += amount;
      yearInput.value = currentYear;
      renderCalendar(currentYear);
    }

    function goToCurrentYear() {
      currentYear = new Date().getFullYear();
      yearInput.value = currentYear;
      renderCalendar(currentYear);
    }

    modalBg.addEventListener("click", function (event) {
      if (event.target === modalBg) {
        closeModal();
      }
    });

    renderCalendar(currentYear);
  </script>
</body>
</html>
