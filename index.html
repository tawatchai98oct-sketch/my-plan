<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Full Year Schedule Planner</title>

  <style>
    :root {
      --bg: #eef2f7;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --border-strong: #cbd5e1;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --success: #16a34a;
      --warning: #d97706;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.10);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.35);
      outline-offset: 2px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(135deg, #111827, #1e293b);
      color: white;
      padding: 10px 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.20);
    }

    .header-inner {
      max-width: 1500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .brand {
      flex: 0 0 auto;
      min-width: 230px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(18px, 1.55vw, 24px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      text-align: left;
    }

    .subtitle {
      margin: 4px 0 0;
      color: #cbd5e1;
      font-size: 11px;
      line-height: 1.25;
      text-align: left;
    }

    .controls {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .controls button,
    .controls input {
      min-height: 32px;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid transparent;
      border-radius: 999px;
    }

    .controls button {
      background: #ffffff;
      color: #111827;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .controls button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.16);
    }

    .controls button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .controls button.range-active {
      background: var(--primary);
      color: white;
      font-weight: 700;
    }

    .controls input {
      background: rgba(255, 255, 255, 0.95);
      color: #111827;
      border-color: rgba(255, 255, 255, 0.28);
    }

    .controls input[type="number"] {
      width: 86px;
      text-align: center;
    }

    .search-input {
      width: min(230px, 92vw);
    }

    .header-meta {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      align-items: center;
      gap: 10px;
    }

    .status {
      margin: 0;
      max-width: none;
      min-height: 0;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1.25;
      text-align: left;
      color: #e5e7eb;
    }

    .status:not(:empty) {
      background: rgba(255, 255, 255, 0.10);
    }

    .status.success {
      color: #bbf7d0;
    }

    .status.error {
      color: #fecaca;
    }

    .status.warning {
      color: #fde68a;
    }

    .legend {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-top: 0;
      color: #cbd5e1;
      font-size: 11px;
      white-space: nowrap;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: #ffffff;
    }

    .legend-swatch.today-swatch {
      background: #fef3c7;
      border-color: #f59e0b;
    }

    .legend-swatch.past-swatch {
      background: #cbd5e1;
    }

    .legend-swatch.range-swatch {
      background: var(--primary);
    }

    .legend-swatch.search-swatch {
      background: #facc15;
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 18px 22px 22px;
    }

    .year-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .loading-message {
      grid-column: 1 / -1;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 22px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .month {
      background: var(--surface);
      border: 1px solid rgba(203, 213, 225, 0.8);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 0 0 10px;
    }

    .month h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .month-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 700;
    }

    .weekdays,
    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      text-align: center;
    }

    .weekdays div {
      font-weight: 700;
      font-size: 11px;
      padding: 6px 0;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .day {
      min-height: 84px;
      padding: 20px 4px 22px;
      border: 1px solid var(--border);
      font-size: 13px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: #fff;
      transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease, transform 0.12s ease;
    }

    .day:hover {
      background: #f8fafc;
      border-color: var(--border-strong);
      z-index: 2;
    }

    .day:active {
      transform: scale(0.985);
    }

    .day.empty {
      background: #f8fafc;
      cursor: default;
      pointer-events: none;
    }

    .past-date {
      background: #f1f5f9;
      color: #64748b;
    }

    .past-date:hover {
      background: #e2e8f0;
    }

    .today {
      background: #fffbeb;
      border: 2px solid #f59e0b;
      color: #111827;
      box-shadow: inset 0 0 0 1px rgba(245, 158, 11, 0.18);
    }

    .day.range-start-selected {
      background: #bfdbfe;
      border-color: var(--primary);
      box-shadow: inset 0 0 0 2px var(--primary);
    }

    .day.range-preview {
      background: var(--primary-soft);
      border-color: #93c5fd;
    }

    .past-date.range-start-selected,
    .past-date.range-preview {
      color: #111827;
    }

    .today.range-start-selected {
      background: #fde68a;
      border-color: var(--primary);
    }

    .today.range-preview {
      background: #fef3c7;
      border-color: #93c5fd;
    }

    .day.search-dim {
      opacity: 0.38;
    }

    .day.search-match {
      opacity: 1;
      border-color: #eab308;
      box-shadow: inset 0 0 0 2px rgba(234, 179, 8, 0.8);
    }

    .date-number {
      font-weight: 800;
      display: block;
      position: absolute;
      top: 5px;
      right: 6px;
      min-width: 17px;
      height: 17px;
      line-height: 17px;
      border-radius: 999px;
      font-size: 10px;
      z-index: 5;
    }

    .today .date-number {
      background: #f59e0b;
      color: white;
    }

    .activity-bar {
      position: absolute;
      left: -1px;
      right: -1px;
      height: 13px;
      padding: 0 6px;
      color: white;
      border-radius: 0;
      font-size: 9px;
      font-weight: 700;
      line-height: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: left;
      z-index: 2;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.20);
    }

    .bar-color-0 { background: #2563eb; }
    .bar-color-1 { background: #16a34a; }
    .bar-color-2 { background: #dc2626; }
    .bar-color-3 { background: #9333ea; }
    .bar-color-4 { background: #ea580c; }
    .bar-color-5 { background: #0891b2; }

    .activity-bar.segment-start {
      left: 4px;
      border-top-left-radius: 8px;
      border-bottom-left-radius: 8px;
    }

    .activity-bar.segment-end {
      right: 4px;
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .activity-bar.segment-single {
      left: 4px;
      right: 4px;
      border-radius: 8px;
    }

    .more-indicator {
      position: absolute;
      left: 4px;
      right: 4px;
      bottom: 5px;
      height: 15px;
      padding: 0 6px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: #f8fafc;
      color: #334155;
      font-size: 9px;
      font-weight: 800;
      line-height: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      z-index: 4;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.12);
    }

    .more-indicator:hover {
      background: #e2e8f0;
      border-color: #94a3b8;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(15, 23, 42, 0.58);
      padding: 18px;
      z-index: 999;
    }

    .modal-bg[hidden] {
      display: none;
    }

    .modal {
      background: var(--surface);
      width: min(860px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
    }

    .modal h3 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .modal-help {
      margin: 0 0 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .activity-row {
      display: grid;
      grid-template-columns: 34px minmax(170px, 1.5fr) minmax(140px, 1fr) minmax(140px, 1fr) 42px;
      gap: 8px;
      align-items: end;
      padding: 10px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .activity-number {
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #374151;
    }

    .field-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      font-weight: 800;
      color: #374151;
    }

    .field-group input {
      width: 100%;
      min-height: 38px;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 9px;
      font-size: 14px;
      background: white;
    }

    .row-error {
      grid-column: 2 / -1;
      margin-top: -2px;
      color: var(--danger);
      font-size: 12px;
      display: none;
    }

    .activity-row.has-error {
      border-color: #fca5a5;
      background: #fff7f7;
    }

    .activity-row.has-error .row-error {
      display: block;
    }

    .remove-activity-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 9px;
      background: var(--danger-soft);
      color: #991b1b;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .remove-activity-btn:hover {
      background: #fecaca;
    }

    .add-activity-btn {
      margin-top: 12px;
      min-height: 38px;
      padding: 9px 13px;
      border: none;
      border-radius: 9px;
      background: #111827;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .modal-actions button {
      min-height: 38px;
      padding: 8px 14px;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      font-weight: 700;
    }

    .modal-actions button:disabled,
    .add-activity-btn:disabled,
    .remove-activity-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .save-btn {
      background: var(--primary);
      color: white;
    }

    .close-btn {
      background: #e5e7eb;
      color: #111827;
    }

    @media (max-width: 1160px) {
      .year-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 980px) {
      .header-top {
        align-items: flex-start;
        flex-direction: column;
      }

      .brand {
        min-width: 0;
      }

      .controls {
        justify-content: flex-start;
        width: 100%;
      }

      .header-meta {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .status {
        text-align: center;
      }

      .legend {
        justify-content: center;
        white-space: normal;
      }
    }

    @media (max-width: 820px) {
      header {
        position: static;
      }

      main {
        padding: 14px;
      }

      .year-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .day {
        min-height: 78px;
      }

      .activity-row {
        grid-template-columns: 28px 1fr;
      }

      .activity-row .field-group,
      .activity-row .row-error {
        grid-column: 2 / 3;
      }

      .remove-activity-btn {
        grid-column: 2 / 3;
        width: 100%;
      }

      .modal-actions {
        flex-direction: column-reverse;
      }

      .modal-actions button,
      .add-activity-btn {
        width: 100%;
      }
    }

    @media (max-width: 520px) {
      .controls {
        align-items: stretch;
      }

      .controls button,
      .controls input {
        flex: 1 1 calc(50% - 10px);
      }

      .controls .search-input {
        flex-basis: 100%;
      }

      .day {
        min-height: 74px;
        padding-left: 2px;
        padding-right: 2px;
      }

      .activity-bar,
      .more-indicator {
        font-size: 8px;
      }
    }

    @media print {
      @page {
        size: landscape;
        margin: 10mm;
      }

      header,
      .modal-bg {
        display: none !important;
      }

      body {
        background: white;
      }

      main {
        max-width: none;
        padding: 0;
      }

      .year-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .month {
        box-shadow: none;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        page-break-inside: avoid;
        padding: 8px;
      }

      .day {
        min-height: 58px;
      }

      .more-indicator {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .activity-bar {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="header-top">
        <div class="brand">
          <h1>Full Year Schedule Planner</h1>
          <p class="subtitle">Plan tasks or ranges, then save to Google Sheets.</p>
        </div>

        <div class="controls" aria-label="Calendar controls">
          <button type="button" id="prevYearButton" aria-label="Previous year">Previous</button>
          <input type="number" id="yearInput" min="1900" max="9999" aria-label="Year" />
          <button type="button" id="nextYearButton" aria-label="Next year">Next</button>
          <button type="button" id="thisYearButton">This Year</button>
          <button type="button" id="rangeSelectButton">Range</button>
          <button type="button" id="reloadButton">Reload</button>
          <button type="button" id="printButton">Print</button>
          <input type="search" id="activitySearchInput" class="search-input" placeholder="Search activities" aria-label="Search activities" />
          <button type="button" id="clearSearchButton">Clear</button>
        </div>
      </div>

      <div class="header-meta">
        <div id="status" class="status" role="status" aria-live="polite">Opening planner...</div>

        <div class="legend" aria-label="Calendar legend">
          <span class="legend-item"><span class="legend-swatch today-swatch"></span>Today</span>
          <span class="legend-item"><span class="legend-swatch past-swatch"></span>Past</span>
          <span class="legend-item"><span class="legend-swatch range-swatch"></span>Range</span>
          <span class="legend-item"><span class="legend-swatch search-swatch"></span>Search</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div id="calendar" class="year-grid" aria-live="polite"></div>
  </main>

  <div class="modal-bg" id="modalBg" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalDate" aria-describedby="modalHelp">
      <h3 id="modalDate"></h3>

      <p class="modal-help" id="modalHelp">
        Normal click opens activities on one date. Use Range Select, then click a start date and end date to create a new activity range.
      </p>

      <div id="activityList" class="activity-list"></div>

      <button type="button" class="add-activity-btn" id="addActivityButton">+ Add Activity</button>

      <div class="modal-actions">
        <button type="button" class="close-btn" id="cancelButton">Cancel</button>
        <button type="button" class="save-btn" id="saveButton">Save All</button>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwHUmxDQ6GaMJWKRTrxcin5g-UrrwKIOodInRKKnoCpbINW6_gCq0eSDSxQO7R8eizIyg/exec";

    const ACTIVITIES_PREFIX = "__ACTIVITIES_V2__";
    const OLD_RANGE_PREFIX = "__RANGE_ACTIVITY__";
    const MAX_VISIBLE_BARS = 3;

    const monthNames = [
      "January", "February", "March", "April",
      "May", "June", "July", "August",
      "September", "October", "November", "December"
    ];

    const weekdayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];

    const calendar = document.getElementById("calendar");
    const yearInput = document.getElementById("yearInput");
    const statusBox = document.getElementById("status");

    const modalBg = document.getElementById("modalBg");
    const modalDate = document.getElementById("modalDate");
    const activityList = document.getElementById("activityList");

    const rangeSelectButton = document.getElementById("rangeSelectButton");
    const addActivityButton = document.getElementById("addActivityButton");
    const saveButton = document.getElementById("saveButton");
    const cancelButton = document.getElementById("cancelButton");
    const activitySearchInput = document.getElementById("activitySearchInput");
    const clearSearchButton = document.getElementById("clearSearchButton");

    let currentYear = new Date().getFullYear();
    let selectedDateKey = "";
    let selectedSourceKeys = [];
    let notesByDate = {};
    let notesCacheByYear = {};
    let dateCellByKey = {};
    let activitiesByDate = {};
    let isBusy = false;
    let activitySearchTerm = "";
    let lastFocusedElement = null;

    let isRangeSelectMode = false;
    let rangeStartDateKey = "";

    yearInput.value = currentYear;

    document.getElementById("prevYearButton").addEventListener("click", function () {
      changeYear(-1);
    });

    document.getElementById("nextYearButton").addEventListener("click", function () {
      changeYear(1);
    });

    document.getElementById("thisYearButton").addEventListener("click", function () {
      goToCurrentYear();
    });

    rangeSelectButton.addEventListener("click", function () {
      toggleRangeSelectMode();
    });

    document.getElementById("reloadButton").addEventListener("click", function () {
      cancelRangeSelectMode(false);
      loadNotesForYear(currentYear, true);
    });

    document.getElementById("printButton").addEventListener("click", function () {
      window.print();
    });

    activitySearchInput.addEventListener("input", function () {
      activitySearchTerm = activitySearchInput.value.trim().toLowerCase();
      applySearchHighlight(true);
    });

    clearSearchButton.addEventListener("click", function () {
      activitySearchInput.value = "";
      activitySearchTerm = "";
      applySearchHighlight(true);
      activitySearchInput.focus();
    });

    addActivityButton.addEventListener("click", function () {
      addActivityRow({
        id: createActivityId(),
        title: "",
        start: selectedDateKey,
        end: selectedDateKey
      });
    });

    saveButton.addEventListener("click", function () {
      saveActivities();
    });

    cancelButton.addEventListener("click", function () {
      closeModal();
    });

    yearInput.addEventListener("change", function () {
      const nextYear = Number(yearInput.value);

      if (!Number.isInteger(nextYear) || nextYear < 1900 || nextYear > 9999) {
        setStatus("Please enter a valid year between 1900 and 9999.", "error");
        yearInput.value = currentYear;
        return;
      }

      cancelRangeSelectMode(false);
      currentYear = nextYear;
      loadNotesForYear(currentYear, false);
    });

    modalBg.addEventListener("click", function (event) {
      if (event.target === modalBg && !isBusy) {
        closeModal();
      }
    });

    calendar.addEventListener("mouseleave", function () {
      if (isRangeSelectMode && rangeStartDateKey) {
        clearRangePreview();
        markRangeStartDate();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        if (!modalBg.hidden && !isBusy) {
          closeModal();
          return;
        }

        if (isRangeSelectMode) {
          cancelRangeSelectMode(true);
          return;
        }
      }

      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
        if (!modalBg.hidden) {
          event.preventDefault();
          saveActivities();
        }
      }
    });

    function loadNotesForYear(year, forceReload) {
      const yearsToLoad = [year - 1, year, year + 1];
      const hasAllCachedYears = yearsToLoad.every(function (yearToLoad) {
        return !forceReload && Object.prototype.hasOwnProperty.call(notesCacheByYear, yearToLoad);
      });

      if (hasAllCachedYears) {
        notesByDate = mergeCachedNotes(yearsToLoad);
        renderCalendar(year);
        setStatus("Loaded from memory. Adjacent years included for cross-year activity ranges.", "success");
        return Promise.resolve(notesByDate);
      }

      calendar.innerHTML = '<div class="loading-message">Loading notes...</div>';
      setStatus("Loading notes from Google Sheet...");

      return Promise.all(yearsToLoad.map(function (yearToLoad) {
        return loadSingleYearNotes(yearToLoad, forceReload);
      }))
        .then(function () {
          notesByDate = mergeCachedNotes(yearsToLoad);
          renderCalendar(year);

          const currentYearCount = Object.keys(notesCacheByYear[year] || {}).length;
          const mergedCount = Object.keys(notesByDate).length;
          setStatus(
            "Loaded from Google Sheet. Current-year records: " + currentYearCount +
            ". Records loaded including adjacent years: " + mergedCount + ".",
            "success"
          );

          return notesByDate;
        })
        .catch(function (error) {
          notesByDate = {};
          renderCalendar(year);
          setStatus(error.message, "error");
          return null;
        });
    }

    function loadSingleYearNotes(year, forceReload) {
      if (!forceReload && Object.prototype.hasOwnProperty.call(notesCacheByYear, year)) {
        return Promise.resolve(notesCacheByYear[year]);
      }

      return callAppsScript("getNotesForYear", { year: year })
        .then(function (response) {
          notesCacheByYear[year] = response.data || {};
          return notesCacheByYear[year];
        });
    }

    function mergeCachedNotes(years) {
      const merged = {};

      years.forEach(function (year) {
        Object.assign(merged, notesCacheByYear[year] || {});
      });

      return merged;
    }

    function renderCalendar(year) {
      calendar.innerHTML = "";
      dateCellByKey = {};
      rebuildActivitiesMap();

      const fragment = document.createDocumentFragment();
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      for (let month = 0; month < 12; month++) {
        const monthBox = document.createElement("section");
        monthBox.className = "month";
        monthBox.setAttribute("aria-labelledby", "month-title-" + String(year) + "-" + String(month));

        const monthHeader = document.createElement("div");
        monthHeader.className = "month-header";

        const title = document.createElement("h2");
        title.id = "month-title-" + String(year) + "-" + String(month);
        title.textContent = monthNames[month];
        monthHeader.appendChild(title);

        const countBadge = document.createElement("span");
        countBadge.className = "month-count";
        const monthActivityCount = getUniqueActivityCountForMonth(year, month);
        countBadge.textContent = String(monthActivityCount);
        countBadge.title = String(monthActivityCount) + " activity" + (monthActivityCount === 1 ? "" : "s") + " this month";
        monthHeader.appendChild(countBadge);

        monthBox.appendChild(monthHeader);

        const weekdays = document.createElement("div");
        weekdays.className = "weekdays";

        weekdayNames.forEach(function (dayName) {
          const weekday = document.createElement("div");
          weekday.textContent = dayName;
          weekdays.appendChild(weekday);
        });

        monthBox.appendChild(weekdays);

        const daysGrid = document.createElement("div");
        daysGrid.className = "days";

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
          const emptyCell = document.createElement("div");
          emptyCell.className = "day empty";
          daysGrid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
          const dateCell = document.createElement("button");
          dateCell.type = "button";
          dateCell.className = "day";

          const dateKey = createDateKey(year, month, day);
          const activitiesForDate = activitiesByDate[dateKey] || [];

          dateCell.dataset.dateKey = dateKey;
          dateCellByKey[dateKey] = dateCell;

          const cellDate = new Date(year, month, day);
          cellDate.setHours(0, 0, 0, 0);

          const isToday = cellDate.getTime() === today.getTime();
          const isPastDate = cellDate.getTime() < today.getTime();

          if (isPastDate) {
            dateCell.classList.add("past-date");
          }

          if (isToday) {
            dateCell.classList.add("today");
            dateCell.id = "today-cell";
          }

          const readableLabel = monthNames[month] + " " + String(day) + ", " + String(year);
          dateCell.setAttribute("aria-label", readableLabel + getActivitySummaryForDate(dateKey));

          const dateNumber = document.createElement("span");
          dateNumber.className = "date-number";
          dateNumber.textContent = String(day);
          dateCell.appendChild(dateNumber);

          activitiesForDate.slice(0, MAX_VISIBLE_BARS).forEach(function (activityInfo, index) {
            addActivityBar(dateCell, activityInfo, year, month, day, totalDays, index);
          });

          if (activitiesForDate.length > MAX_VISIBLE_BARS) {
            const hiddenActivities = activitiesForDate.slice(MAX_VISIBLE_BARS);
            const moreIndicator = document.createElement("span");
            moreIndicator.className = "more-indicator";
            moreIndicator.textContent = "+" + String(hiddenActivities.length) + " more";
            moreIndicator.title = "Hidden activities:\n" + getHiddenActivityTitles(hiddenActivities) + "\n\nClick the date to view and edit all activities.";
            dateCell.appendChild(moreIndicator);
          }

          dateCell.addEventListener("click", function () {
            handleDateClick(dateKey);
          });

          dateCell.addEventListener("mouseenter", function () {
            previewRangeSelection(dateKey);
          });

          daysGrid.appendChild(dateCell);
        }

        monthBox.appendChild(daysGrid);
        fragment.appendChild(monthBox);
      }

      calendar.appendChild(fragment);

      if (isRangeSelectMode && rangeStartDateKey) {
        markRangeStartDate();
      }

      applySearchHighlight(false);
    }

    function handleDateClick(dateKey) {
      if (isBusy || !modalBg.hidden) {
        return;
      }

      if (!isRangeSelectMode) {
        openModalForDate(dateKey);
        return;
      }

      if (!rangeStartDateKey) {
        rangeStartDateKey = dateKey;
        clearRangeSelection();
        markRangeStartDate();
        setStatus("Start date selected. Now click the end date.", "success");
        return;
      }

      const orderedRange = orderDateRange(rangeStartDateKey, dateKey);

      cancelRangeSelectMode(false);
      openModalForNewRange(orderedRange.start, orderedRange.end);
    }

    function toggleRangeSelectMode() {
      if (isRangeSelectMode) {
        cancelRangeSelectMode(true);
        return;
      }

      isRangeSelectMode = true;
      rangeStartDateKey = "";
      rangeSelectButton.classList.add("range-active");
      rangeSelectButton.textContent = "Cancel Range";
      clearRangeSelection();
      setStatus("Range Select is active. Click a start date.", "success");
    }

    function cancelRangeSelectMode(showStatus) {
      isRangeSelectMode = false;
      rangeStartDateKey = "";
      rangeSelectButton.classList.remove("range-active");
      rangeSelectButton.textContent = "Range Select";
      clearRangeSelection();

      if (showStatus) {
        setStatus("Range selection cancelled.", "warning");
      }
    }

    function markRangeStartDate() {
      if (rangeStartDateKey && dateCellByKey[rangeStartDateKey]) {
        dateCellByKey[rangeStartDateKey].classList.add("range-start-selected");
      }
    }

    function previewRangeSelection(hoverDateKey) {
      if (!isRangeSelectMode || !rangeStartDateKey) {
        return;
      }

      clearRangePreview();

      const orderedRange = orderDateRange(rangeStartDateKey, hoverDateKey);
      const keys = getDateKeysInRange(orderedRange.start, orderedRange.end);

      keys.forEach(function (dateKey) {
        if (dateCellByKey[dateKey]) {
          dateCellByKey[dateKey].classList.add("range-preview");
        }
      });

      markRangeStartDate();
    }

    function clearRangeSelection() {
      Object.keys(dateCellByKey).forEach(function (dateKey) {
        dateCellByKey[dateKey].classList.remove("range-start-selected");
        dateCellByKey[dateKey].classList.remove("range-preview");
      });
    }

    function clearRangePreview() {
      Object.keys(dateCellByKey).forEach(function (dateKey) {
        dateCellByKey[dateKey].classList.remove("range-preview");
      });
    }

    function orderDateRange(firstKey, secondKey) {
      if (compareDateKeys(firstKey, secondKey) <= 0) {
        return {
          start: firstKey,
          end: secondKey
        };
      }

      return {
        start: secondKey,
        end: firstKey
      };
    }

    function addActivityBar(dateCell, activityInfo, year, month, day, totalDays, stackIndex) {
      const dateKey = createDateKey(year, month, day);
      const dayOfWeek = new Date(year, month, day).getDay();

      const isRangeStart = dateKey === activityInfo.start;
      const isRangeEnd = dateKey === activityInfo.end;
      const isWeekStart = dayOfWeek === 0;
      const isWeekEnd = dayOfWeek === 6;
      const isMonthStart = day === 1;
      const isMonthEnd = day === totalDays;

      const isSegmentStart = isRangeStart || isWeekStart || isMonthStart;
      const isSegmentEnd = isRangeEnd || isWeekEnd || isMonthEnd;

      const bar = document.createElement("span");
      bar.className = "activity-bar bar-color-" + String(activityInfo.colorIndex % 6);

      if (isSegmentStart && isSegmentEnd) {
        bar.classList.add("segment-single");
      } else {
        if (isSegmentStart) {
          bar.classList.add("segment-start");
        }

        if (isSegmentEnd) {
          bar.classList.add("segment-end");
        }
      }

      bar.style.top = String(21 + stackIndex * 14) + "px";
      bar.title = activityInfo.title + " (" + activityInfo.start + " to " + activityInfo.end + ")";

      if (isSegmentStart) {
        bar.textContent = activityInfo.title;
      }

      dateCell.appendChild(bar);
    }

    function rebuildActivitiesMap() {
      activitiesByDate = {};

      const records = getAllActivityRecords();

      records.forEach(function (record) {
        record.activities.forEach(function (activity) {
          const normalizedActivity = normalizeActivityDates(activity, record.sourceKey);

          if (!normalizedActivity.title || !normalizedActivity.start || !normalizedActivity.end) {
            return;
          }

          if (compareDateKeys(normalizedActivity.end, normalizedActivity.start) < 0) {
            return;
          }

          const dateKeys = getDateKeysInRange(normalizedActivity.start, normalizedActivity.end);

          dateKeys.forEach(function (dateKey) {
            if (!activitiesByDate[dateKey]) {
              activitiesByDate[dateKey] = [];
            }

            activitiesByDate[dateKey].push({
              sourceKey: record.sourceKey,
              id: normalizedActivity.id,
              title: normalizedActivity.title,
              start: normalizedActivity.start,
              end: normalizedActivity.end,
              colorIndex: getStableColorIndex(normalizedActivity.id + normalizedActivity.title)
            });
          });
        });
      });

      Object.keys(activitiesByDate).forEach(function (dateKey) {
        activitiesByDate[dateKey].sort(function (a, b) {
          const startComparison = compareDateKeys(a.start, b.start);
          if (startComparison !== 0) {
            return startComparison;
          }

          return a.title.localeCompare(b.title);
        });
      });
    }

    function getAllActivityRecords() {
      const records = [];

      Object.keys(notesByDate).forEach(function (sourceKey) {
        const parsed = parseStoredValue(notesByDate[sourceKey], sourceKey);

        if (parsed.type === "activities") {
          records.push({
            sourceKey: sourceKey,
            activities: parsed.activities
          });
        }
      });

      return records;
    }

    function openModalForDate(dateKey) {
      selectedDateKey = dateKey;
      selectedSourceKeys = getSourceKeysTouchingDate(selectedDateKey);

      const date = dateKeyToDate(dateKey);
      modalDate.textContent = date.getDate() + " " + monthNames[date.getMonth()] + " " + date.getFullYear();

      activityList.innerHTML = "";

      const activitiesForPopup = [];

      selectedSourceKeys.forEach(function (sourceKey) {
        const parsed = parseStoredValue(notesByDate[sourceKey], sourceKey);

        if (parsed.type !== "activities") {
          return;
        }

        parsed.activities.forEach(function (activity) {
          const normalizedActivity = normalizeActivityDates(activity, sourceKey);

          if (dateKeyInRange(selectedDateKey, normalizedActivity.start, normalizedActivity.end)) {
            activitiesForPopup.push({
              id: normalizedActivity.id || createActivityId(),
              title: normalizedActivity.title || "",
              start: normalizedActivity.start || selectedDateKey,
              end: normalizedActivity.end || selectedDateKey,
              originalSourceKey: sourceKey
            });
          }
        });
      });

      if (activitiesForPopup.length === 0) {
        activitiesForPopup.push({
          id: createActivityId(),
          title: "",
          start: selectedDateKey,
          end: selectedDateKey,
          originalSourceKey: ""
        });
      }

      activitiesForPopup.forEach(function (activity) {
        addActivityRow(activity);
      });

      showModalAndFocus();
    }

    function openModalForNewRange(startKey, endKey) {
      selectedDateKey = startKey;
      selectedSourceKeys = [];

      modalDate.textContent = "New Activity Range";
      activityList.innerHTML = "";

      addActivityRow({
        id: createActivityId(),
        title: "",
        start: startKey,
        end: endKey,
        originalSourceKey: ""
      });

      showModalAndFocus();
    }

    function showModalAndFocus() {
      lastFocusedElement = document.activeElement;
      modalBg.hidden = false;
      document.body.style.overflow = "hidden";

      const firstInput = activityList.querySelector(".activity-title-input");
      if (firstInput) {
        firstInput.focus();
      }
    }

    function addActivityRow(activity) {
      const row = document.createElement("div");
      row.className = "activity-row";
      row.dataset.activityId = activity.id || createActivityId();
      row.dataset.originalSourceKey = activity.originalSourceKey || "";

      const number = document.createElement("div");
      number.className = "activity-number";
      row.appendChild(number);

      const titleGroup = document.createElement("div");
      titleGroup.className = "field-group";

      const titleLabel = document.createElement("label");
      titleLabel.textContent = "Activity";
      titleGroup.appendChild(titleLabel);

      const titleInput = document.createElement("input");
      titleInput.type = "text";
      titleInput.className = "activity-title-input";
      titleInput.placeholder = "Activity name";
      titleInput.value = activity.title || "";
      titleInput.maxLength = 120;
      titleGroup.appendChild(titleInput);

      row.appendChild(titleGroup);

      const startGroup = document.createElement("div");
      startGroup.className = "field-group";

      const startLabel = document.createElement("label");
      startLabel.textContent = "Start date";
      startGroup.appendChild(startLabel);

      const startInput = document.createElement("input");
      startInput.type = "date";
      startInput.className = "activity-start-input";
      startInput.value = activity.start || selectedDateKey;
      startGroup.appendChild(startInput);

      row.appendChild(startGroup);

      const endGroup = document.createElement("div");
      endGroup.className = "field-group";

      const endLabel = document.createElement("label");
      endLabel.textContent = "End date";
      endGroup.appendChild(endLabel);

      const endInput = document.createElement("input");
      endInput.type = "date";
      endInput.className = "activity-end-input";
      endInput.value = activity.end || selectedDateKey;
      endInput.min = startInput.value;
      endGroup.appendChild(endInput);

      row.appendChild(endGroup);

      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.className = "remove-activity-btn";
      removeButton.textContent = "×";
      removeButton.setAttribute("aria-label", "Remove activity row");
      removeButton.addEventListener("click", function () {
        row.remove();
        renumberActivityRows();

        if (activityList.children.length === 0) {
          addActivityRow({
            id: createActivityId(),
            title: "",
            start: selectedDateKey,
            end: selectedDateKey
          });
        }
      });

      row.appendChild(removeButton);

      const rowError = document.createElement("div");
      rowError.className = "row-error";
      row.appendChild(rowError);

      startInput.addEventListener("change", function () {
        endInput.min = startInput.value;

        if (isValidDateKey(startInput.value) && (!endInput.value || compareDateKeys(endInput.value, startInput.value) < 0)) {
          endInput.value = startInput.value;
        }
      });

      [titleInput, startInput, endInput].forEach(function (input) {
        input.addEventListener("input", function () {
          clearRowError(row);
        });
      });

      activityList.appendChild(row);
      renumberActivityRows();
    }

    function renumberActivityRows() {
      Array.from(activityList.children).forEach(function (row, index) {
        const number = row.querySelector(".activity-number");
        const removeButton = row.querySelector(".remove-activity-btn");

        if (number) {
          number.textContent = String(index + 1) + ".";
        }

        if (removeButton) {
          removeButton.setAttribute("aria-label", "Remove activity " + String(index + 1));
        }
      });
    }

    function saveActivities() {
      if (!selectedDateKey || isBusy) {
        return;
      }

      clearAllRowErrors();

      const rows = Array.from(activityList.children);
      const newActivities = [];

      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const titleInput = row.querySelector(".activity-title-input");
        const startInput = row.querySelector(".activity-start-input");
        const endInput = row.querySelector(".activity-end-input");

        const title = titleInput.value.trim();
        const start = startInput.value;
        const end = endInput.value || start;

        if (!title && !start && !end) {
          continue;
        }

        if (!title) {
          showRowError(row, "Activity " + String(i + 1) + " needs a name.");
          titleInput.focus();
          setStatus("Activity " + String(i + 1) + " needs a name.", "error");
          return;
        }

        if (!isValidDateKey(start) || !isValidDateKey(end)) {
          showRowError(row, "Activity " + String(i + 1) + " needs valid dates.");
          startInput.focus();
          setStatus("Activity " + String(i + 1) + " needs valid dates.", "error");
          return;
        }

        if (compareDateKeys(end, start) < 0) {
          showRowError(row, "End date cannot be before start date.");
          endInput.focus();
          setStatus("Activity " + String(i + 1) + " end date cannot be before start date.", "error");
          return;
        }

        newActivities.push({
          id: row.dataset.activityId || createActivityId(),
          title: title,
          start: start,
          end: end,
          originalSourceKey: row.dataset.originalSourceKey || ""
        });
      }

      const groupedBySourceKey = buildUpdatedActivityGroups(newActivities);
      const sourceKeysToSave = Object.keys(groupedBySourceKey);

      if (sourceKeysToSave.length === 0) {
        closeModal();
        setStatus("No changes to save.", "warning");
        return;
      }

      isBusy = true;
      setModalBusy(true, "save");
      setStatus("Saving activities to Google Sheet...");

      const tasks = sourceKeysToSave.map(function (sourceKey) {
        const activities = groupedBySourceKey[sourceKey];

        if (activities.length > 0) {
          return callAppsScript("saveNote", {
            dateKey: sourceKey,
            note: encodeActivitiesValue(activities)
          });
        }

        return callAppsScript("deleteNote", {
          dateKey: sourceKey
        });
      });

      Promise.all(tasks)
        .then(function () {
          sourceKeysToSave.forEach(function (sourceKey) {
            const activities = groupedBySourceKey[sourceKey];

            if (activities.length > 0) {
              setLocalNote(sourceKey, encodeActivitiesValue(activities));
            } else {
              removeLocalNote(sourceKey);
            }
          });

          closeModal();
          renderCalendar(currentYear);
          setStatus("Activities saved.", "success");
        })
        .catch(function (error) {
          isBusy = false;
          setModalBusy(false);
          setStatus(error.message, "error");
        });
    }

    function buildUpdatedActivityGroups(newActivities) {
      const affectedSourceKeys = {};
      selectedSourceKeys.forEach(function (sourceKey) {
        affectedSourceKeys[sourceKey] = true;
      });

      newActivities.forEach(function (activity) {
        if (activity.originalSourceKey) {
          affectedSourceKeys[activity.originalSourceKey] = true;
        }

        affectedSourceKeys[activity.start] = true;
      });

      const grouped = {};

      Object.keys(affectedSourceKeys).forEach(function (sourceKey) {
        const parsed = parseStoredValue(notesByDate[sourceKey], sourceKey);

        if (parsed.type === "activities") {
          grouped[sourceKey] = parsed.activities.filter(function (activity) {
            const normalizedActivity = normalizeActivityDates(activity, sourceKey);
            return !dateKeyInRange(selectedDateKey, normalizedActivity.start, normalizedActivity.end);
          });
        } else {
          grouped[sourceKey] = [];
        }
      });

      newActivities.forEach(function (activity) {
        const sourceKey = activity.start;

        if (!grouped[sourceKey]) {
          grouped[sourceKey] = [];
        }

        grouped[sourceKey].push({
          id: activity.id || createActivityId(),
          title: activity.title,
          start: activity.start,
          end: activity.end
        });
      });

      return grouped;
    }

    function getSourceKeysTouchingDate(dateKey) {
      const sourceKeys = {};
      const activities = activitiesByDate[dateKey] || [];

      activities.forEach(function (activity) {
        sourceKeys[activity.sourceKey] = true;
      });

      return Object.keys(sourceKeys);
    }

    function closeModal() {
      modalBg.hidden = true;
      document.body.style.overflow = "";
      selectedDateKey = "";
      selectedSourceKeys = [];
      activityList.innerHTML = "";
      isBusy = false;
      setModalBusy(false);

      if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
        lastFocusedElement.focus();
      }

      lastFocusedElement = null;
    }

    function setModalBusy(busy, action) {
      saveButton.disabled = busy;
      cancelButton.disabled = busy;
      addActivityButton.disabled = busy;

      Array.from(activityList.querySelectorAll("input, button")).forEach(function (element) {
        element.disabled = busy;
      });

      saveButton.textContent = busy && action === "save" ? "Saving..." : "Save All";
    }

    function encodeActivitiesValue(activities) {
      return ACTIVITIES_PREFIX + JSON.stringify({
        version: 2,
        activities: activities
      });
    }

    function parseStoredValue(value, fallbackDateKey) {
      if (!value) {
        return {
          type: "empty",
          activities: []
        };
      }

      const safeFallbackDateKey = isValidDateKey(fallbackDateKey) ? fallbackDateKey : "";

      if (typeof value === "string" && value.indexOf(ACTIVITIES_PREFIX) === 0) {
        try {
          const data = JSON.parse(value.slice(ACTIVITIES_PREFIX.length));

          if (data && Array.isArray(data.activities)) {
            return {
              type: "activities",
              activities: data.activities.map(function (activity) {
                const start = isValidDateKey(activity.start) ? activity.start : safeFallbackDateKey;
                const end = isValidDateKey(activity.end) ? activity.end : start;

                return {
                  id: activity.id || createActivityId(),
                  title: String(activity.title || ""),
                  start: start,
                  end: end
                };
              })
            };
          }
        } catch (error) {
          return {
            type: "activities",
            activities: []
          };
        }
      }

      if (typeof value === "string" && value.indexOf(OLD_RANGE_PREFIX) === 0) {
        try {
          const oldData = JSON.parse(value.slice(OLD_RANGE_PREFIX.length));
          const start = isValidDateKey(oldData.start) ? oldData.start : safeFallbackDateKey;
          const end = isValidDateKey(oldData.end) ? oldData.end : start;

          return {
            type: "activities",
            activities: [
              {
                id: oldData.id || createActivityId(),
                title: oldData.title || "",
                start: start,
                end: end
              }
            ]
          };
        } catch (error) {
          return {
            type: "activities",
            activities: []
          };
        }
      }

      return {
        type: "activities",
        activities: [
          {
            id: createActivityId(),
            title: String(value),
            start: safeFallbackDateKey,
            end: safeFallbackDateKey
          }
        ]
      };
    }

    function normalizeActivityDates(activity, fallbackDateKey) {
      const safeFallbackDateKey = isValidDateKey(fallbackDateKey) ? fallbackDateKey : "";
      const start = isValidDateKey(activity.start) ? activity.start : safeFallbackDateKey;
      const end = isValidDateKey(activity.end) ? activity.end : start;

      return {
        id: activity.id || createActivityId(),
        title: String(activity.title || ""),
        start: start,
        end: end
      };
    }

    function createDateKey(year, month, day) {
      const monthNumber = String(month + 1).padStart(2, "0");
      const dayNumber = String(day).padStart(2, "0");
      return String(year) + "-" + monthNumber + "-" + dayNumber;
    }

    function dateToDateKey(date) {
      return createDateKey(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function dateKeyToDate(dateKey) {
      const parts = String(dateKey).split("-");
      return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    }

    function isValidDateKey(dateKey) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(String(dateKey))) {
        return false;
      }

      const date = dateKeyToDate(dateKey);
      return dateToDateKey(date) === dateKey;
    }

    function compareDateKeys(firstDateKey, secondDateKey) {
      if (firstDateKey < secondDateKey) {
        return -1;
      }

      if (firstDateKey > secondDateKey) {
        return 1;
      }

      return 0;
    }

    function dateKeyInRange(dateKey, startKey, endKey) {
      return compareDateKeys(dateKey, startKey) >= 0 && compareDateKeys(dateKey, endKey) <= 0;
    }

    function getDateKeysInRange(startKey, endKey) {
      const keys = [];
      const startDate = dateKeyToDate(startKey);
      const endDate = dateKeyToDate(endKey);
      const cursor = new Date(startDate.getTime());

      while (cursor.getTime() <= endDate.getTime()) {
        keys.push(dateToDateKey(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }

      return keys;
    }

    function createActivityId() {
      if (window.crypto && window.crypto.randomUUID) {
        return "activity_" + window.crypto.randomUUID();
      }

      return "activity_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    }

    function changeYear(amount) {
      cancelRangeSelectMode(false);
      currentYear += amount;
      yearInput.value = currentYear;
      loadNotesForYear(currentYear, false);
    }

    function goToCurrentYear() {
      cancelRangeSelectMode(false);
      currentYear = new Date().getFullYear();
      yearInput.value = currentYear;

      loadNotesForYear(currentYear, false).then(function () {
        scrollTodayIntoView();
      });
    }

    function scrollTodayIntoView() {
      const todayCell = document.getElementById("today-cell");
      if (todayCell) {
        todayCell.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    function setStatus(message, type) {
      statusBox.textContent = message || "";
      statusBox.className = "status";

      if (type) {
        statusBox.classList.add(type);
      }
    }

    function showRowError(row, message) {
      row.classList.add("has-error");
      const rowError = row.querySelector(".row-error");
      if (rowError) {
        rowError.textContent = message;
      }
    }

    function clearRowError(row) {
      row.classList.remove("has-error");
      const rowError = row.querySelector(".row-error");
      if (rowError) {
        rowError.textContent = "";
      }
    }

    function clearAllRowErrors() {
      Array.from(activityList.children).forEach(function (row) {
        clearRowError(row);
      });
    }

    function getStableColorIndex(value) {
      const text = String(value || "");
      let hash = 0;

      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }

      return Math.abs(hash) % 6;
    }

    function getUniqueActivityCountForMonth(year, month) {
      const unique = {};
      const totalDays = new Date(year, month + 1, 0).getDate();

      for (let day = 1; day <= totalDays; day++) {
        const dateKey = createDateKey(year, month, day);
        const activities = activitiesByDate[dateKey] || [];

        activities.forEach(function (activity) {
          unique[activity.sourceKey + "::" + activity.id] = true;
        });
      }

      return Object.keys(unique).length;
    }

    function getActivitySummaryForDate(dateKey) {
      const activities = activitiesByDate[dateKey] || [];

      if (activities.length === 0) {
        return ". No activities.";
      }

      return ". Activities: " + activities.map(function (activity) {
        return activity.title;
      }).join(", ") + ".";
    }

    function getHiddenActivityTitles(activities) {
      return activities.map(function (activity) {
        return activity.title + " (" + activity.start + " to " + activity.end + ")";
      }).join("\n");
    }

    function applySearchHighlight(showStatusMessage) {
      const term = activitySearchTerm;
      let matchedDays = 0;
      let matchedActivities = 0;

      Object.keys(dateCellByKey).forEach(function (dateKey) {
        const cell = dateCellByKey[dateKey];
        const activities = activitiesByDate[dateKey] || [];

        cell.classList.remove("search-match");
        cell.classList.remove("search-dim");

        if (!term) {
          return;
        }

        const matches = activities.filter(function (activity) {
          return activity.title.toLowerCase().indexOf(term) !== -1;
        });

        if (matches.length > 0) {
          cell.classList.add("search-match");
          matchedDays += 1;
          matchedActivities += matches.length;
        } else if (activities.length > 0) {
          cell.classList.add("search-dim");
        }
      });

      if (showStatusMessage) {
        if (!term) {
          setStatus("Search cleared.", "success");
        } else if (matchedActivities > 0) {
          setStatus(
            "Search matched " + matchedActivities + " activity instance" + (matchedActivities === 1 ? "" : "s") +
            " across " + matchedDays + " day" + (matchedDays === 1 ? "" : "s") + ".",
            "success"
          );
        } else {
          setStatus("No activities matched the search term.", "warning");
        }
      }
    }

    function setLocalNote(sourceKey, value) {
      notesByDate[sourceKey] = value;

      const year = Number(String(sourceKey).slice(0, 4));
      if (!Number.isInteger(year)) {
        return;
      }

      if (!notesCacheByYear[year]) {
        notesCacheByYear[year] = {};
      }

      notesCacheByYear[year][sourceKey] = value;
    }

    function removeLocalNote(sourceKey) {
      delete notesByDate[sourceKey];

      const year = Number(String(sourceKey).slice(0, 4));
      if (Number.isInteger(year) && notesCacheByYear[year]) {
        delete notesCacheByYear[year][sourceKey];
      }
    }

    function callAppsScript(action, params) {
      return new Promise(function (resolve, reject) {
        const callbackName =
          "jsonpCallback_" +
          Date.now() +
          "_" +
          Math.random().toString(36).slice(2);

        const url = new URL(APPS_SCRIPT_URL);
        url.searchParams.set("action", action);
        url.searchParams.set("callback", callbackName);
        url.searchParams.set("_cacheBust", String(Date.now()));

        Object.keys(params || {}).forEach(function (key) {
          url.searchParams.set(key, params[key]);
        });

        let didCleanUp = false;

        const timeout = window.setTimeout(function () {
          cleanup();

          reject(new Error(
            "Apps Script did not respond within 20 seconds. Check the deployment URL, access permission, or backend error logs."
          ));
        }, 20000);

        window[callbackName] = function (payload) {
          cleanup();

          if (!payload || payload.ok !== true) {
            const message =
              payload && payload.error
                ? payload.error
                : "Apps Script returned an error.";
            reject(new Error(message));
            return;
          }

          resolve(payload);
        };

        const script = document.createElement("script");
        script.src = url.toString();

        script.onerror = function () {
          cleanup();

          reject(new Error(
            "Browser could not load Apps Script. Check the /exec URL and deployment permission."
          ));
        };

        document.body.appendChild(script);

        function cleanup() {
          if (didCleanUp) {
            return;
          }

          didCleanUp = true;
          window.clearTimeout(timeout);
          delete window[callbackName];

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    loadNotesForYear(currentYear, false);
  </script>
</body>
</html>
