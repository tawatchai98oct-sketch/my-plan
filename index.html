    function loadNotesForYear(year, forceReload) {
      const yearsToLoad = getLoadYearsForPlanner(year);
      calendar.innerHTML = '<div class="loading-message">Loading notes from Google Sheet...</div>';
      setStatus("Loading Google Sheet...");
      return refreshYearsFromBackend(yearsToLoad, year, true);
    }

    function refreshYearsFromBackend(yearsToLoad, displayYear, forceReload) {
      return loadMultipleYearNotes(yearsToLoad, true)
        .then(function () {
          notesByDate = mergeCachedNotes(yearsToLoad);
          activityRecordsCache = null;
          renderCalendar(displayYear);

          const currentYearCount = Object.keys(notesCacheByYear[displayYear] || {}).length;
          const mergedCount = Object.keys(notesByDate).length;
          setStatus(
            "Loaded from Google Sheet. Records: " + currentYearCount +
            ". Total: " + mergedCount + ".",
            "success"
          );

          return notesByDate;
        })
        .catch(function (error) {
          notesByDate = {};
          yearsToLoad.forEach(function (yearToLoad) {
            notesCacheByYear[yearToLoad] = {};
          });
          activityRecordsCache = null;
          renderCalendar(displayYear);
          setStatus("Could not load Google Sheet: " + error.message, "error");
          return null;
        });
    }

    function loadMultipleYearNotes(yearsToLoad, forceReload) {
      const yearsNeedingLoad = yearsToLoad.slice();

      const applyYearData = function (dataByYear) {
        return applyBackendDataByYear(dataByYear, yearsNeedingLoad);
      };

      const loadFromAppsScript = function () {
        return callAppsScript("getNotesForYears", {
          years: JSON.stringify(yearsNeedingLoad),
          fresh: "1"
        }).then(function (response) {
          return applyYearData(response.data || {});
        });
      };

      if (APPS_SCRIPT_URL && APPS_SCRIPT_URL.indexOf("https://script.google.com/macros/") === 0) {
        return loadFromAppsScript();
      }

      return loadPublishedNoteDataCsv(yearsNeedingLoad, true).then(applyYearData);
    }

    function loadPublishedNoteDataCsv(yearsToLoad, forceReload) {
      if (!NOTE_DATA_CSV_URL) {
        return Promise.reject(new Error("Published Note Data CSV URL is not configured."));
      }

      let csvUrl;
      try {
        csvUrl = new URL(NOTE_DATA_CSV_URL);
      } catch (error) {
        return Promise.reject(new Error("Published Note Data CSV URL is invalid."));
      }

      if (forceReload) {
        csvUrl.searchParams.set("_cacheBust", String(Date.now()));
      }

      return fetch(csvUrl.toString(), {
        cache: forceReload ? "reload" : "default"
      })
        .then(function (response) {
          if (!response.ok) {
            throw new Error("Published Note Data CSV returned HTTP " + response.status + ".");
          }

          return response.text();
        })
        .then(function (csvText) {
          return parsePublishedNoteDataCsv(csvText, yearsToLoad);
        });
    }

    function parsePublishedNoteDataCsv(csvText, yearsToLoad) {
      const rows = parseCsvRows(csvText).filter(function (row) {
        return row.some(function (cell) {
          return String(cell || "").trim() !== "";
        });
      });

      const result = {};
      const wantedYears = {};

      yearsToLoad.forEach(function (yearToLoad) {
        const year = String(yearToLoad);
        wantedYears[year] = true;
        result[year] = {};
      });

      if (rows.length === 0) {
        return result;
      }

      const header = rows[0].map(function (cell) {
        return String(cell || "").trim().toLowerCase().replace(/\s+/g, "");
      });

      let dateKeyIndex = header.indexOf("datekey");
      let noteIndex = header.indexOf("note");
      let firstDataRowIndex = 1;

      if (dateKeyIndex < 0 || noteIndex < 0) {
        dateKeyIndex = 0;
        noteIndex = 1;
        firstDataRowIndex = 0;

        if (!rows[0] || !isValidPlannerStorageKey(rows[0][dateKeyIndex])) {
          throw new Error("Published Note Data CSV must contain DateKey and Note columns.");
        }
      }

      rows.slice(firstDataRowIndex).forEach(function (row) {
        const dateKey = String(row[dateKeyIndex] || "").trim();

        if (!isValidPlannerStorageKey(dateKey)) {
          return;
        }

        const year = dateKey.slice(0, 4);
        if (!wantedYears[year]) {
          return;
        }

        result[year][dateKey] = String(row[noteIndex] || "");
      });

      return result;
    }

    function parseCsvRows(csvText) {
      const rows = [];
      let row = [];
      let value = "";
      let insideQuotes = false;
      const text = String(csvText || "");

      for (let index = 0; index < text.length; index++) {
        const char = text[index];
        const nextChar = text[index + 1];

        if (insideQuotes) {
          if (char === '"' && nextChar === '"') {
            value += '"';
            index++;
          } else if (char === '"') {
            insideQuotes = false;
          } else {
            value += char;
          }
          continue;
        }

        if (char === '"') {
          insideQuotes = true;
        } else if (char === ",") {
          row.push(value);
          value = "";
        } else if (char === "\n") {
          row.push(value);
          rows.push(row);
          row = [];
          value = "";
        } else if (char !== "\r") {
          value += char;
        }
      }

      row.push(value);
      rows.push(row);
      return rows;
    }

    function isValidPlannerStorageKey(dateKey) {
      const text = String(dateKey || "").trim();
      return isValidDateKey(text) || /^\d{4}-unscheduled-notes$/.test(text);
    }

    function loadSingleYearNotes(year, forceReload) {
      return loadMultipleYearNotes([year], true).then(function () {
        return notesCacheByYear[year] || {};
      });
    }

    function mergeCachedNotes(years) {
      const merged = {};

      years.forEach(function (year) {
        Object.assign(merged, notesCacheByYear[year] || {});
      });

      return merged;
    }


    function normalizeYearList(years) {
      const lookup = {};
      const result = [];

      (years || []).forEach(function (year) {
        const parsedYear = Number(year);
        if (!Number.isInteger(parsedYear) || parsedYear < 1900 || parsedYear > 9999 || lookup[parsedYear]) {
          return;
        }

        lookup[parsedYear] = true;
        result.push(parsedYear);
      });

      result.sort(function (a, b) {
        return a - b;
      });

      return result;
    }

    function getYearsForStorageKeys(storageKeys) {
      return normalizeYearList((storageKeys || []).map(function (storageKey) {
        return Number(String(storageKey || "").slice(0, 4));
      }));
    }

    function applyBackendDataByYear(dataByYear, yearsToApply) {
      const normalized = normalizeBackendDataByYear(dataByYear, yearsToApply);

      yearsToApply.forEach(function (yearToApply) {
        notesCacheByYear[yearToApply] = normalized[String(yearToApply)] || {};
        authoritativeSheetYears[String(yearToApply)] = true;
      });

      return notesCacheByYear;
    }

    function normalizeBackendDataByYear(rawData, yearsToApply) {
      const result = {};
      const yearLookup = {};
      const source = rawData && typeof rawData === "object" && !Array.isArray(rawData) ? rawData : {};

      yearsToApply.forEach(function (yearToApply) {
        const year = String(yearToApply);
        result[year] = {};
        yearLookup[year] = true;
      });

      Object.keys(source).forEach(function (key) {
        const value = source[key];
        const keyText = String(key || "").trim();

        if (/^\d{4}$/.test(keyText) && yearLookup[keyText] && value && typeof value === "object" && !Array.isArray(value)) {
          Object.keys(value).forEach(function (dateKey) {
            const storageKey = String(dateKey || "").trim();
            if (isValidPlannerStorageKey(storageKey) && storageKey.slice(0, 4) === keyText) {
              result[keyText][storageKey] = String(value[dateKey] || "");
            }
          });
          return;
        }

        if (isValidPlannerStorageKey(keyText)) {
          const year = keyText.slice(0, 4);
          if (yearLookup[year]) {
            result[year][keyText] = String(value || "");
          }
        }
      });

      return result;
    }

    function getYearsForChangeConfirmation(notesToSave, dateKeysToDelete) {
      const storageKeys = [];

      (notesToSave || []).forEach(function (item) {
        storageKeys.push(item.dateKey);
      });

      (dateKeysToDelete || []).forEach(function (dateKey) {
        storageKeys.push(dateKey);
      });

      return normalizeYearList(getLoadYearsForPlanner(currentYear).concat(getYearsForStorageKeys(storageKeys)));
    }

    function confirmBackendChanges(notesToSave, dateKeysToDelete) {
      const yearsToLoad = getYearsForChangeConfirmation(notesToSave, dateKeysToDelete);

      // Always read the sheet again after a write. Some older Apps Script deployments
      // return a flat data object or stale data in the save response, which caused false
      // confirmation failures and disappearing activities after refresh.
      return loadMultipleYearNotes(yearsToLoad, true).then(function () {
        const latestNotes = mergeCachedNotes(yearsToLoad);
        const missingSavedKeys = (notesToSave || []).filter(function (item) {
          return String(latestNotes[item.dateKey] || "") !== String(item.note || "");
        }).map(function (item) {
          return item.dateKey;
        });

        const stillPresentDeletedKeys = (dateKeysToDelete || []).filter(function (dateKey) {
          return Object.prototype.hasOwnProperty.call(latestNotes, dateKey);
        });

        if (missingSavedKeys.length > 0 || stillPresentDeletedKeys.length > 0) {
          const parts = [];

          if (missingSavedKeys.length > 0) {
            parts.push("not found after save: " + missingSavedKeys.join(", "));
          }

          if (stillPresentDeletedKeys.length > 0) {
            parts.push("still present after delete: " + stillPresentDeletedKeys.join(", "));
          }

          throw new Error(
            "Google Sheet did not return the confirmed change (" + parts.join("; ") + "). " +
            "This means the live Apps Script did not persist the same Note Data rows that the website requested."
          );
        }

        notesByDate = mergeCachedNotes(getLoadYearsForPlanner(currentYear));
        activityRecordsCache = null;
        return latestNotes;
      });
    }

    function saveAndConfirmPlannerChanges(notesToSave, dateKeysToDelete) {
      const yearsToConfirm = getYearsForChangeConfirmation(notesToSave, dateKeysToDelete);
      const primaryPayload = {
        notes: JSON.stringify(notesToSave || []),
        deleteKeys: JSON.stringify(dateKeysToDelete || []),
        returnYears: JSON.stringify(yearsToConfirm)
      };

      return callAppsScript("saveChanges", primaryPayload)
        .then(function () {
          return confirmBackendChanges(notesToSave, dateKeysToDelete);
        })
        .catch(function (primaryError) {
          // Retry with single-row actions. This works with both the current backend and
          // several older deployments that saved saveNote/deleteNote correctly but had
          // weaker saveChanges behavior.
          return savePlannerChangesIndividually(notesToSave, dateKeysToDelete, yearsToConfirm)
            .then(function () {
              return confirmBackendChanges(notesToSave, dateKeysToDelete);
            })
            .catch(function (fallbackError) {
              throw new Error(
                fallbackError.message +
                " Primary bulk save error: " +
                (primaryError && primaryError.message ? primaryError.message : String(primaryError))
              );
            });
        });
    }

    function savePlannerChangesIndividually(notesToSave, dateKeysToDelete, yearsToConfirm) {
      let chain = Promise.resolve();
      const returnYears = JSON.stringify(yearsToConfirm || []);

      (notesToSave || []).forEach(function (item) {
        chain = chain.then(function () {
          return callAppsScript("saveNote", {
            dateKey: item.dateKey,
            note: item.note,
            returnYears: returnYears
          });
        });
      });

      (dateKeysToDelete || []).forEach(function (dateKey) {
        chain = chain.then(function () {
          return callAppsScript("deleteNote", {
            dateKey: dateKey,
            returnYears: returnYears
          });
        });
      });

      return chain;
    }

    function hasAuthoritativeSheetDataForYear(year) {
      return Object.prototype.hasOwnProperty.call(authoritativeSheetYears, String(year));
    }

    function getLoadYearsForPlanner(year) {
      return [year - 1, year, year + 1];
    }

    function startSheetAutoSync() {
      if (sheetSyncTimerId !== null) {
        window.clearInterval(sheetSyncTimerId);
      }

      sheetSyncTimerId = window.setInterval(function () {
        syncSheetEditsFromBackend(true);
      }, SHEET_SYNC_INTERVAL_MS);
    }

    function syncSheetEditsFromBackend(isAutomatic) {
      if (!hasInitialLoadCompleted || isSheetSyncing || isBusy || !modalBg.hidden || document.hidden) {
        return Promise.resolve(false);
      }

      const yearsToLoad = getLoadYearsForPlanner(currentYear);
      const previousSnapshot = stableStringify(mergeCachedNotes(yearsToLoad));
      isSheetSyncing = true;

      return loadMultipleYearNotes(yearsToLoad, true)
        .then(function () {
          const nextNotes = mergeCachedNotes(yearsToLoad);
          const nextSnapshot = stableStringify(nextNotes);

          if (nextSnapshot !== previousSnapshot) {
            notesByDate = nextNotes;
            activityRecordsCache = null;
            renderCalendar(currentYear);
            setStatus("Synced latest Google Sheet edits.", "success");
            isSheetSyncing = false;
            return true;
          }

          if (!isAutomatic) {
            setStatus("Already up to date with Google Sheet.", "success");
          }

          isSheetSyncing = false;
          return false;
        })
        .catch(function (error) {
          isSheetSyncing = false;

          if (!isAutomatic) {
            setStatus("Sync failed: " + error.message, "warning");
          }

          return false;
        });
    }

    function stableStringify(value) {
      if (value === null || typeof value !== "object") {
        return JSON.stringify(value);
      }

      if (Array.isArray(value)) {
        return "[" + value.map(stableStringify).join(",") + "]";
      }

      return "{" + Object.keys(value).sort().map(function (key) {
        return JSON.stringify(key) + ":" + stableStringify(value[key]);
      }).join(",") + "}";
    }

    function renderCalendar(year) {
      calendar.innerHTML = "";
      dateCellByKey = {};
      rebuildActivitiesMap();
      loadBacklogNotesForYear(year);
      renderPendingActivitiesSidebar();
      renderBacklogNotes();

      const fragment = document.createDocumentFragment();
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      for (let month = 0; month < 12; month++) {
        const monthBox = document.createElement("section");
        monthBox.className = "month";
        monthBox.id = "month-" + String(year) + "-" + String(month);
        monthBox.setAttribute("aria-labelledby", "month-title-" + String(year) + "-" + String(month));

        const monthHeader = document.createElement("div");
        monthHeader.className = "month-header";

        const title = document.createElement("h2");
        title.id = "month-title-" + String(year) + "-" + String(month);
        title.textContent = monthNames[month];
        monthHeader.appendChild(title);

        const countBadge = document.createElement("span");
        countBadge.className = "month-count";
        const monthActivityCount = getUniqueActivityCountForMonth(year, month);
        countBadge.textContent = String(monthActivityCount);
        countBadge.title = String(monthActivityCount) + " activity" + (monthActivityCount === 1 ? "" : "s") + " this month";
        monthHeader.appendChild(countBadge);

        monthBox.appendChild(monthHeader);

        const weekdays = document.createElement("div");
        weekdays.className = "weekdays";

        weekdayNames.forEach(function (dayName) {
          const weekday = document.createElement("div");
          weekday.textContent = dayName;
          weekdays.appendChild(weekday);
        });

        monthBox.appendChild(weekdays);

        const daysGrid = document.createElement("div");
        daysGrid.className = "days";

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) {
          const emptyCell = document.createElement("div");
          emptyCell.className = "day empty";
          daysGrid.appendChild(emptyCell);
        }

        for (let day = 1; day <= totalDays; day++) {
          const dateCell = document.createElement("button");
          dateCell.type = "button";
          dateCell.className = "day";

          const dateKey = createDateKey(year, month, day);
          const activitiesForDate = activitiesByDate[dateKey] || [];
          const thailandHolidays = getThailandHolidaysForDate(dateKey);

          dateCell.dataset.dateKey = dateKey;
          dateCellByKey[dateKey] = dateCell;

          const cellDate = new Date(year, month, day);
          cellDate.setHours(0, 0, 0, 0);

          const isToday = cellDate.getTime() === today.getTime();
          const isPastDate = cellDate.getTime() < today.getTime();

          if (isPastDate) {
            dateCell.classList.add("past-date");
          }

          if (isToday) {
            dateCell.classList.add("today");
            dateCell.id = "today-cell";
          }

          if (thailandHolidays.length > 0) {
            dateCell.classList.add("holiday-date");
            dateCell.title = thailandHolidays.join("\n");
          }

          const readableLabel = monthNames[month] + " " + String(day) + ", " + String(year);
          dateCell.setAttribute("aria-label", readableLabel + getHolidaySummaryForDate(dateKey) + getActivitySummaryForDate(dateKey));

          const dateNumber = document.createElement("span");
          dateNumber.className = "date-number";
          dateNumber.textContent = String(day);
          dateCell.appendChild(dateNumber);

          if (thailandHolidays.length > 0) {
            const holidayBadge = document.createElement("span");
            holidayBadge.className = "holiday-badge";
            holidayBadge.textContent = thailandHolidays.join(" / ");
            holidayBadge.title = thailandHolidays.join("\n");
            dateCell.appendChild(holidayBadge);
          }

          activitiesForDate.slice(0, MAX_VISIBLE_BARS).forEach(function (activityInfo, index) {
            addActivityBar(dateCell, activityInfo, year, month, day, totalDays, index);
          });

          if (activitiesForDate.length > MAX_VISIBLE_BARS) {
            const hiddenActivities = activitiesForDate.slice(MAX_VISIBLE_BARS);
            const moreIndicator = document.createElement("span");
            moreIndicator.className = "more-indicator";
            moreIndicator.textContent = "+" + String(hiddenActivities.length) + " more";
            moreIndicator.title = "Hidden activities:\n" + getHiddenActivityTitles(hiddenActivities) + "\n\nClick the date to view and edit all activities.";
            dateCell.appendChild(moreIndicator);
          }

          daysGrid.appendChild(dateCell);
        }

        monthBox.appendChild(daysGrid);
        fragment.appendChild(monthBox);
      }

      calendar.appendChild(fragment);

      if (isRangeSelectMode && rangeStartDateKey) {
        markRangeStartDate();
      }

      applySearchHighlight(false);
    }

    function handleDateClick(dateKey) {
      if (isBusy || !modalBg.hidden) {
        return;
      }

      if (!isRangeSelectMode) {
        openModalForDate(dateKey);
        return;
      }

      if (!rangeStartDateKey) {
        rangeStartDateKey = dateKey;
        clearRangeSelection();
        markRangeStartDate();
        setStatus("Select end date.", "success");
        return;
      }

      const orderedRange = orderDateRange(rangeStartDateKey, dateKey);

      cancelRangeSelectMode(false);
      openModalForNewRange(orderedRange.start, orderedRange.end);
    }

    function toggleRangeSelectMode() {
      if (isRangeSelectMode) {
        cancelRangeSelectMode(true);
        return;
      }

      isRangeSelectMode = true;
      rangeStartDateKey = "";
      rangeSelectButton.classList.add("range-active");
      rangeSelectButton.textContent = "Cancel Range";
      clearRangeSelection();
      setStatus("Select start date.", "success");
    }

    function cancelRangeSelectMode(showStatus) {
      isRangeSelectMode = false;
      rangeStartDateKey = "";
      lastRangePreviewDateKey = "";
      rangeSelectButton.classList.remove("range-active");
      rangeSelectButton.textContent = "Range Select";
      clearRangeSelection();

      if (showStatus) {
        setStatus("Range cancelled.", "warning");
      }
    }

    function markRangeStartDate() {
      if (rangeStartDateKey && dateCellByKey[rangeStartDateKey]) {
        dateCellByKey[rangeStartDateKey].classList.add("range-start-selected");
      }
    }

    function previewRangeSelection(hoverDateKey) {
      if (!isRangeSelectMode || !rangeStartDateKey) {
        return;
      }

      clearRangePreview();

      const orderedRange = orderDateRange(rangeStartDateKey, hoverDateKey);
      const keys = getDateKeysInRange(orderedRange.start, orderedRange.end);

      keys.forEach(function (dateKey) {
        if (dateCellByKey[dateKey]) {
          dateCellByKey[dateKey].classList.add("range-preview");
        }
      });

      markRangeStartDate();
    }

    function clearRangeSelection() {
      Object.keys(dateCellByKey).forEach(function (dateKey) {
        dateCellByKey[dateKey].classList.remove("range-start-selected");
        dateCellByKey[dateKey].classList.remove("range-preview");
      });
    }

    function clearRangePreview() {
      Object.keys(dateCellByKey).forEach(function (dateKey) {
        dateCellByKey[dateKey].classList.remove("range-preview");
      });
    }

    function orderDateRange(firstKey, secondKey) {
      if (compareDateKeys(firstKey, secondKey) <= 0) {
        return {
          start: firstKey,
          end: secondKey
        };
      }

      return {
        start: secondKey,
        end: firstKey
      };
    }

    function addActivityBar(dateCell, activityInfo, year, month, day, totalDays, stackIndex) {
      const dateKey = createDateKey(year, month, day);
      const dayOfWeek = new Date(year, month, day).getDay();

      const isRangeStart = dateKey === activityInfo.start;
      const isRangeEnd = dateKey === activityInfo.end;
      const isWeekStart = dayOfWeek === 0;
      const isWeekEnd = dayOfWeek === 6;
      const isMonthStart = day === 1;
      const isMonthEnd = day === totalDays;

      const isSegmentStart = isRangeStart || isWeekStart || isMonthStart;
      const isSegmentEnd = isRangeEnd || isWeekEnd || isMonthEnd;

      const bar = document.createElement("span");
      bar.className = "activity-bar bar-color-" + String(activityInfo.colorIndex % 6);

      if (activityInfo.completed) {
        bar.classList.add("completed-activity-bar");
      }

      if (isSegmentStart && isSegmentEnd) {
        bar.classList.add("segment-single");
      } else {
        if (isSegmentStart) {
          bar.classList.add("segment-start");
        }

        if (isSegmentEnd) {
          bar.classList.add("segment-end");
        }
      }

      const firstBarTop = 34;
      const barGap = 15;
      bar.style.top = String(firstBarTop + stackIndex * barGap) + "px";

      const durationText = formatActivityDuration(activityInfo.start, activityInfo.end);
      const durationShort = formatActivityDurationShort(activityInfo.start, activityInfo.end);
      const completionText = activityInfo.completed ? "Completed, " : "";
      bar.title = activityInfo.title + " (" + completionText + activityInfo.start + " to " + activityInfo.end + ", " + durationText + ")";

      if (isSegmentStart) {
        bar.textContent = (activityInfo.completed ? "✓ " : "") + activityInfo.title + (durationShort ? " · " + durationShort : "");
      }

      dateCell.appendChild(bar);
    }

    function rebuildActivitiesMap() {
      activitiesByDate = {};
      activityRecordsCache = buildActivityRecords();

      activityRecordsCache.forEach(function (record) {
        record.activities.forEach(function (activity) {
          const normalizedActivity = normalizeActivityDates(activity, record.sourceKey);

          if (!normalizedActivity.title || !normalizedActivity.start || !normalizedActivity.end) {
            return;
          }

          if (compareDateKeys(normalizedActivity.end, normalizedActivity.start) < 0) {
            return;
          }

          const colorIndex = getStableColorIndex(normalizedActivity.id + normalizedActivity.title);
          const dateKeys = getDateKeysInRange(normalizedActivity.start, normalizedActivity.end);

          dateKeys.forEach(function (dateKey) {
            if (!activitiesByDate[dateKey]) {
              activitiesByDate[dateKey] = [];
            }

            activitiesByDate[dateKey].push({
              sourceKey: record.sourceKey,
              id: normalizedActivity.id,
              title: normalizedActivity.title,
              start: normalizedActivity.start,
              end: normalizedActivity.end,
              completed: normalizedActivity.completed,
              colorIndex: colorIndex
            });
          });
        });
      });

      Object.keys(activitiesByDate).forEach(function (dateKey) {
        activitiesByDate[dateKey].sort(function (a, b) {
          const completionComparison = Number(a.completed) - Number(b.completed);
          if (completionComparison !== 0) {
            return completionComparison;
          }

          const startComparison = compareDateKeys(a.start, b.start);
          if (startComparison !== 0) {
            return startComparison;
          }

          return a.title.localeCompare(b.title);
        });
      });
    }

    function buildActivityRecords() {
      const records = [];

      Object.keys(notesByDate).forEach(function (sourceKey) {
        const parsed = parseStoredValue(notesByDate[sourceKey], sourceKey);

        if (parsed.type === "activities") {
          records.push({
            sourceKey: sourceKey,
            activities: parsed.activities
          });
        }
      });

      return records;
    }

    function getAllActivityRecords() {
      if (!activityRecordsCache) {
        activityRecordsCache = buildActivityRecords();
      }

      return activityRecordsCache;
    }

    function openModalForDate(dateKey) {
      selectedDateKey = dateKey;
      selectedSourceKeys = getSourceKeysTouchingDate(selectedDateKey);

      const date = dateKeyToDate(dateKey);
      modalDate.textContent = date.getDate() + " " + monthNames[date.getMonth()] + " " + date.getFullYear();

      activityList.innerHTML = "";

      const activitiesForPopup = [];

      selectedSourceKeys.forEach(function (sourceKey) {
        const parsed = parseStoredValue(notesByDate[sourceKey], sourceKey);

        if (parsed.type !== "activities") {
          return;
        }

        parsed.activities.forEach(function (activity) {
          const normalizedActivity = normalizeActivityDates(activity, sourceKey);

          if (dateKeyInRange(selectedDateKey, normalizedActivity.start, normalizedActivity.end)) {
            activitiesForPopup.push({
              id: normalizedActivity.id || createActivityId(),
              title: normalizedActivity.title || "",
              start: normalizedActivity.start || selectedDateKey,
              end: normalizedActivity.end || selectedDateKey,
              completed: normalizedActivity.completed,
              originalSourceKey: sourceKey
            });
          }
        });
      });

      if (activitiesForPopup.length === 0) {
        activitiesForPopup.push({
          id: createActivityId(),
          title: "",
          start: selectedDateKey,
          end: selectedDateKey,
          completed: false,
          originalSourceKey: ""
        });
      }

      activitiesForPopup.forEach(function (activity) {
        addActivityRow(activity);
      });

      showModalAndFocus();
    }

    function openModalForNewRange(startKey, endKey) {
      selectedDateKey = startKey;
      selectedSourceKeys = [];

      modalDate.textContent = "New Activity Range";
      activityList.innerHTML = "";

      addActivityRow({
        id: createActivityId(),
        title: "",
        start: startKey,
        end: endKey,
        completed: false,
        originalSourceKey: ""
      });

      showModalAndFocus();
    }

    function showModalAndFocus() {
      lastFocusedElement = document.activeElement;
      modalBg.hidden = false;
      document.body.style.overflow = "hidden";

      const firstInput = activityList.querySelector(".activity-title-input");
      if (firstInput) {
        firstInput.focus();
      }
    }

    function addActivityRow(activity) {
      const row = document.createElement("div");
      row.className = "activity-row";
      row.dataset.activityId = activity.id || createActivityId();
      row.dataset.originalSourceKey = activity.originalSourceKey || "";
      row.dataset.completed = activity.completed ? "true" : "false";

      const hasStartValue = Object.prototype.hasOwnProperty.call(activity, "start");
      const hasEndValue = Object.prototype.hasOwnProperty.call(activity, "end");
      const initialStartValue = hasStartValue ? activity.start : selectedDateKey;
      const initialEndValue = hasEndValue ? activity.end : initialStartValue;

      const number = document.createElement("div");
      number.className = "activity-number";
      row.appendChild(number);

      const completionGroup = document.createElement("div");
      completionGroup.className = "completion-group";

      const completionLabel = document.createElement("label");
      completionLabel.textContent = "Status";
      completionGroup.appendChild(completionLabel);

      const completionButton = document.createElement("button");
      completionButton.type = "button";
      completionButton.className = "completion-toggle";
      completionButton.setAttribute("aria-pressed", row.dataset.completed === "true" ? "true" : "false");
      completionGroup.appendChild(completionButton);

      row.appendChild(completionGroup);

      function updateCompletionDisplay() {
        const isCompleted = row.dataset.completed === "true";
        row.classList.toggle("completed-activity", isCompleted);
        completionButton.classList.toggle("is-completed", isCompleted);
        completionButton.textContent = isCompleted ? "Done" : "Open";
        completionButton.setAttribute("aria-pressed", isCompleted ? "true" : "false");
        completionButton.setAttribute("aria-label", isCompleted ? "Mark open" : "Mark done");
      }

      completionButton.addEventListener("click", function () {
        row.dataset.completed = row.dataset.completed === "true" ? "false" : "true";
        updateCompletionDisplay();
        sortActivityRowsByCompletion();
      });

      const titleGroup = document.createElement("div");
      titleGroup.className = "field-group";

      const titleLabel = document.createElement("label");
      titleLabel.textContent = "Activity";
      titleGroup.appendChild(titleLabel);

      const titleInput = document.createElement("input");
      titleInput.type = "text";
      titleInput.className = "activity-title-input";
      titleInput.placeholder = "Activity name";
      titleInput.value = activity.title || "";
      titleInput.maxLength = 120;
      titleGroup.appendChild(titleInput);

      row.appendChild(titleGroup);

      const startGroup = document.createElement("div");
      startGroup.className = "field-group";

      const startLabel = document.createElement("label");
      startLabel.textContent = "Start date";
      startGroup.appendChild(startLabel);

      const startInput = document.createElement("input");
      startInput.type = "date";
      startInput.className = "activity-start-input";
      startInput.value = initialStartValue || "";
      startGroup.appendChild(startInput);

      row.appendChild(startGroup);

      const endGroup = document.createElement("div");
      endGroup.className = "field-group";

      const endLabel = document.createElement("label");
      endLabel.textContent = "End date";
      endGroup.appendChild(endLabel);

      const endInput = document.createElement("input");
      endInput.type = "date";
      endInput.className = "activity-end-input";
      endInput.value = initialEndValue || "";
      endInput.min = startInput.value;
      endGroup.appendChild(endInput);

      row.appendChild(endGroup);

      const durationGroup = document.createElement("div");
      durationGroup.className = "field-group activity-duration";

      const durationLabel = document.createElement("label");
      durationLabel.textContent = "Days";
      durationGroup.appendChild(durationLabel);

      const durationValue = document.createElement("div");
      durationValue.className = "activity-duration-value";
      durationValue.setAttribute("aria-live", "polite");
      durationGroup.appendChild(durationValue);

      row.appendChild(durationGroup);

      function updateDurationDisplay() {
        const durationText = formatActivityDuration(startInput.value, endInput.value || startInput.value);
        durationValue.textContent = durationText || "—";
        durationValue.classList.toggle("invalid-duration", !durationText);
      }

      updateDurationDisplay();
      updateCompletionDisplay();

      const removeButton = document.createElement("button");
      removeButton.type = "button";
      removeButton.className = "remove-activity-btn";
      removeButton.textContent = "×";
      removeButton.setAttribute("aria-label", "Remove activity row");
      removeButton.addEventListener("click", function () {
        row.remove();
        renumberActivityRows();

        if (activityList.children.length === 0) {
          setStatus("No activities.", "warning");
        }
      });

      row.appendChild(removeButton);

      const rowError = document.createElement("div");
      rowError.className = "row-error";
      row.appendChild(rowError);

      startInput.addEventListener("change", function () {
        endInput.min = startInput.value;

        if (isValidDateKey(startInput.value) && (!endInput.value || compareDateKeys(endInput.value, startInput.value) < 0)) {
          endInput.value = startInput.value;
        }

        updateDurationDisplay();
      });

      endInput.addEventListener("change", updateDurationDisplay);

      [titleInput, startInput, endInput].forEach(function (input) {
        input.addEventListener("input", function () {
          clearRowError(row);
          updateDurationDisplay();
        });
      });

      activityList.appendChild(row);
      sortActivityRowsByCompletion();
      renumberActivityRows();
    }

    function sortActivityRowsByCompletion() {
      const rows = Array.from(activityList.children);
      rows.sort(function (a, b) {
        const completionComparison = Number(a.dataset.completed === "true") - Number(b.dataset.completed === "true");
        if (completionComparison !== 0) {
          return completionComparison;
        }

        const aEnd = a.querySelector(".activity-end-input") ? a.querySelector(".activity-end-input").value : "";
        const bEnd = b.querySelector(".activity-end-input") ? b.querySelector(".activity-end-input").value : "";
        if (aEnd && bEnd && aEnd !== bEnd) {
          return compareDateKeys(aEnd, bEnd);
        }

        return 0;
      });

      rows.forEach(function (row) {
        activityList.appendChild(row);
      });

      renumberActivityRows();
    }

    function renumberActivityRows() {
      Array.from(activityList.children).forEach(function (row, index) {
        const number = row.querySelector(".activity-number");
        const removeButton = row.querySelector(".remove-activity-btn");

        if (number) {
          number.textContent = String(index + 1) + ".";
        }

        if (removeButton) {
          removeButton.setAttribute("aria-label", "Remove activity " + String(index + 1));
        }
      });
    }

    function saveActivities() {
      if (!selectedDateKey || isBusy) {
        return;
      }

      clearAllRowErrors();

      const rows = Array.from(activityList.children);
      const newActivities = [];

      if (pendingScheduledBacklogNoteId && rows.length === 1) {
        const row = rows[0];
        const titleInput = row.querySelector(".activity-title-input");
        const startInput = row.querySelector(".activity-start-input");
        const endInput = row.querySelector(".activity-end-input");
        const title = titleInput ? titleInput.value.trim() : "";
        const start = startInput ? startInput.value : "";
        const rawEnd = endInput ? endInput.value : "";

        if (title && !start && !rawEnd) {
          const noteToUpdate = backlogNotes.find(function (note) {
            return note.id === pendingScheduledBacklogNoteId;
          });

          if (!noteToUpdate) {
            setStatus("Could not find that note.", "error");
            return;
          }

          noteToUpdate.text = title;
          noteToUpdate.updatedAt = new Date().toISOString();
          closeModal();
          persistBacklogNotes("Note updated.");
          return;
        }
      }

      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const titleInput = row.querySelector(".activity-title-input");
        const startInput = row.querySelector(".activity-start-input");
        const endInput = row.querySelector(".activity-end-input");

        const title = titleInput.value.trim();
        const start = startInput.value;
        const end = endInput.value || start;

        if (!title && !start && !end) {
          continue;
        }

        if (!title) {
          showRowError(row, "Activity " + String(i + 1) + " needs a name.");
          titleInput.focus();
          setStatus("Activity " + String(i + 1) + " needs a name.", "error");
          return;
        }

        if (!isValidDateKey(start) || !isValidDateKey(end)) {
          const dateError = pendingScheduledBacklogNoteId
            ? "Activity " + String(i + 1) + " needs valid dates. To keep this as an undated note, clear both date fields."
            : "Activity " + String(i + 1) + " needs valid dates.";
          showRowError(row, dateError);
          startInput.focus();
          setStatus(dateError, "error");
          return;
        }

        if (compareDateKeys(end, start) < 0) {
          showRowError(row, "End date cannot be before start date.");
          endInput.focus();
          setStatus("Activity " + String(i + 1) + " end date cannot be before start date.", "error");
          return;
        }

        newActivities.push({
          id: row.dataset.activityId || createActivityId(),
          title: title,
          start: start,
          end: end,
          completed: row.dataset.completed === "true",
          originalSourceKey: row.dataset.originalSourceKey || ""
        });
      }

      const groupedBySourceKey = buildUpdatedActivityGroups(newActivities);
      const sourceKeysToSave = Object.keys(groupedBySourceKey);
      const scheduledBacklogNoteId = pendingScheduledBacklogNoteId;
      const updatedBacklogNotesAfterScheduling = scheduledBacklogNoteId
        ? backlogNotes.filter(function (note) {
            return note.id !== scheduledBacklogNoteId;
          })
        : null;

      if (sourceKeysToSave.length === 0) {
        closeModal();
        setStatus("No changes to save.", "warning");
        return;
      }

      isBusy = true;
      setModalBusy(true, "save");
      setStatus("Saving...");

      const notesToSave = [];
      const dateKeysToDelete = [];

      sourceKeysToSave.forEach(function (sourceKey) {
        const activities = groupedBySourceKey[sourceKey];

        if (activities.length > 0) {
          notesToSave.push({
            dateKey: sourceKey,
            note: encodeActivitiesValue(activities)
          });
          return;
        }

        dateKeysToDelete.push(sourceKey);
      });

      if (scheduledBacklogNoteId) {
        const backlogSourceKey = getBacklogSourceKey(currentYear);

        if (updatedBacklogNotesAfterScheduling.length > 0) {
          notesToSave.push({
            dateKey: backlogSourceKey,
            note: encodeBacklogNotesValue(updatedBacklogNotesAfterScheduling)
          });
        } else {
          dateKeysToDelete.push(backlogSourceKey);
        }
      }

      saveAndConfirmPlannerChanges(notesToSave, dateKeysToDelete)
        .then(function () {
          closeModal();
          renderCalendar(currentYear);
          setStatus(scheduledBacklogNoteId ? "Scheduled and confirmed in Google Sheet." : "Saved and confirmed in Google Sheet.", "success");
        })
        .catch(function (error) {
          isBusy = false;
          setModalBusy(false);
          setStatus("Google Sheet save failed: " + error.message, "error");
        });
    }

    function buildUpdatedActivityGroups(newActivities) {
      const affectedSourceKeys = {};
      selectedSourceKeys.forEach(function (sourceKey) {
        affectedSourceKeys[sourceKey] = true;
      });

      newActivities.forEach(function (activity) {
        if (activity.originalSourceKey) {
          affectedSourceKeys[activity.originalSourceKey] = true;
        }

        affectedSourceKeys[activity.start] = true;
      });

      const grouped = {};

      Object.keys(affectedSourceKeys).forEach(function (sourceKey) {
        const parsed = parseStoredValue(notesByDate[sourceKey], sourceKey);

        if (parsed.type === "activities") {
          grouped[sourceKey] = parsed.activities.filter(function (activity) {
            const normalizedActivity = normalizeActivityDates(activity, sourceKey);
            return !dateKeyInRange(selectedDateKey, normalizedActivity.start, normalizedActivity.end);
          });
        } else {
          grouped[sourceKey] = [];
        }
      });

      newActivities.forEach(function (activity) {
        const sourceKey = activity.start;

        if (!grouped[sourceKey]) {
          grouped[sourceKey] = [];
        }

        grouped[sourceKey].push({
          id: activity.id || createActivityId(),
          title: activity.title,
          start: activity.start,
          end: activity.end,
          completed: activity.completed === true
        });
      });

      return grouped;
    }

    function getSourceKeysTouchingDate(dateKey) {
      const sourceKeys = {};
      const activities = activitiesByDate[dateKey] || [];

      activities.forEach(function (activity) {
        sourceKeys[activity.sourceKey] = true;
      });

      return Object.keys(sourceKeys);
    }

    function closeModal() {
      modalBg.hidden = true;
      document.body.style.overflow = "";
      selectedDateKey = "";
      selectedSourceKeys = [];
      pendingScheduledBacklogNoteId = "";
      activityList.innerHTML = "";
      isBusy = false;
      setModalBusy(false);

      if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
        lastFocusedElement.focus();
      }

      lastFocusedElement = null;
    }

    function setModalBusy(busy, action) {
      saveButton.disabled = busy;
      cancelButton.disabled = busy;
      addActivityButton.disabled = busy;

      Array.from(activityList.querySelectorAll("input, button")).forEach(function (element) {
        element.disabled = busy;
      });

      saveButton.textContent = busy && action === "save" ? "Saving..." : "Save All";
    }

    function encodeActivitiesValue(activities) {
      return ACTIVITIES_PREFIX + JSON.stringify({
        version: 2,
        activities: activities
      });
    }

    function parseStoredValue(value, fallbackDateKey) {
      if (!value) {
        return {
          type: "empty",
          activities: []
        };
      }

      if (typeof value === "string" && value.indexOf(UNSCHEDULED_NOTES_PREFIX) === 0) {
        return {
          type: "unscheduled",
          activities: []
        };
      }

      const safeFallbackDateKey = isValidDateKey(fallbackDateKey) ? fallbackDateKey : "";

      if (typeof value === "string" && value.indexOf(ACTIVITIES_PREFIX) === 0) {
        try {
          const data = JSON.parse(value.slice(ACTIVITIES_PREFIX.length));

          if (data && Array.isArray(data.activities)) {
            return {
              type: "activities",
              activities: data.activities.map(function (activity) {
                const start = isValidDateKey(activity.start) ? activity.start : safeFallbackDateKey;
                const end = isValidDateKey(activity.end) ? activity.end : start;

                return {
                  id: activity.id || createActivityId(),
                  title: String(activity.title || ""),
                  start: start,
                  end: end,
                  completed: activity.completed === true
                };
              })
            };
          }
        } catch (error) {
          return {
            type: "activities",
            activities: []
          };
        }
      }

      if (typeof value === "string" && value.indexOf(OLD_RANGE_PREFIX) === 0) {
        try {
          const oldData = JSON.parse(value.slice(OLD_RANGE_PREFIX.length));
          const start = isValidDateKey(oldData.start) ? oldData.start : safeFallbackDateKey;
          const end = isValidDateKey(oldData.end) ? oldData.end : start;

          return {
            type: "activities",
            activities: [
              {
                id: oldData.id || createActivityId(),
                title: oldData.title || "",
                start: start,
                end: end,
                completed: oldData.completed === true
              }
            ]
          };
        } catch (error) {
          return {
            type: "activities",
            activities: []
          };
        }
      }

      return {
        type: "activities",
        activities: [
          {
            id: createActivityId(),
            title: String(value),
            start: safeFallbackDateKey,
            end: safeFallbackDateKey,
            completed: false
          }
        ]
      };
    }

    function normalizeActivityDates(activity, fallbackDateKey) {
      const safeFallbackDateKey = isValidDateKey(fallbackDateKey) ? fallbackDateKey : "";
      const start = isValidDateKey(activity.start) ? activity.start : safeFallbackDateKey;
      const end = isValidDateKey(activity.end) ? activity.end : start;

      return {
        id: activity.id || createActivityId(),
        title: String(activity.title || ""),
        start: start,
        end: end,
        completed: activity.completed === true
      };
    }

    function getInclusiveDayCount(startKey, endKey) {
      if (!isValidDateKey(startKey) || !isValidDateKey(endKey) || compareDateKeys(endKey, startKey) < 0) {
        return 0;
      }

      const startDate = dateKeyToDate(startKey);
      const endDate = dateKeyToDate(endKey);
      return Math.round((endDate.getTime() - startDate.getTime()) / 86400000) + 1;
    }

    function formatActivityDuration(startKey, endKey) {
      const dayCount = getInclusiveDayCount(startKey, endKey || startKey);

      if (!dayCount) {
        return "";
      }

      return String(dayCount) + " " + (dayCount === 1 ? "day" : "days");
    }

    function formatActivityDurationShort(startKey, endKey) {
      const dayCount = getInclusiveDayCount(startKey, endKey || startKey);
      return dayCount ? String(dayCount) + "d" : "";
    }

    function createDateKey(year, month, day) {
      const monthNumber = String(month + 1).padStart(2, "0");
      const dayNumber = String(day).padStart(2, "0");
      return String(year) + "-" + monthNumber + "-" + dayNumber;
    }

    function dateToDateKey(date) {
      return createDateKey(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function dateKeyToDate(dateKey) {
      const parts = String(dateKey).split("-");
      return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
    }

    function isValidDateKey(dateKey) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(String(dateKey))) {
        return false;
      }

      const date = dateKeyToDate(dateKey);
      return dateToDateKey(date) === dateKey;
    }

    function compareDateKeys(firstDateKey, secondDateKey) {
      if (firstDateKey < secondDateKey) {
        return -1;
      }

      if (firstDateKey > secondDateKey) {
        return 1;
      }

      return 0;
    }

    function dateKeyInRange(dateKey, startKey, endKey) {
      return compareDateKeys(dateKey, startKey) >= 0 && compareDateKeys(dateKey, endKey) <= 0;
    }

    function getDateKeysInRange(startKey, endKey) {
      const keys = [];
      const startDate = dateKeyToDate(startKey);
      const endDate = dateKeyToDate(endKey);
      const cursor = new Date(startDate.getTime());

      while (cursor.getTime() <= endDate.getTime()) {
        keys.push(dateToDateKey(cursor));
        cursor.setDate(cursor.getDate() + 1);
      }

      return keys;
    }

    function createActivityId() {
      if (window.crypto && window.crypto.randomUUID) {
        return "activity_" + window.crypto.randomUUID();
      }

      return "activity_" + Date.now() + "_" + Math.random().toString(36).slice(2);
    }

    function changeYear(amount) {
      cancelRangeSelectMode(false);
      currentYear += amount;
      yearInput.value = currentYear;
      loadNotesForYear(currentYear, false);
    }

    function goToCurrentYear() {
      cancelRangeSelectMode(false);
      currentYear = new Date().getFullYear();
      yearInput.value = currentYear;

      loadNotesForYear(currentYear, false).then(function () {
        scrollCurrentMonthIntoView("smooth");
      });
    }

    function scrollCurrentMonthIntoView(preferredBehavior) {
      const today = new Date();

      if (currentYear !== today.getFullYear()) {
        return;
      }

      const currentMonth = document.getElementById("month-" + String(today.getFullYear()) + "-" + String(today.getMonth()));
      const fallbackTodayCell = document.getElementById("today-cell");
      const target = currentMonth || fallbackTodayCell;

      if (!target) {
        return;
      }

      const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const behavior = reduceMotion ? "auto" : (preferredBehavior || "smooth");

      window.requestAnimationFrame(function () {
        target.scrollIntoView({
          behavior: behavior,
          block: "start"
        });
      });
    }

    function scrollTodayIntoView() {
      scrollCurrentMonthIntoView("smooth");
    }

    function setStatus(message, type) {
      statusBox.textContent = message || "";
      statusBox.className = "status";

      if (type) {
        statusBox.classList.add(type);
      }
    }

    function showRowError(row, message) {
      row.classList.add("has-error");
      const rowError = row.querySelector(".row-error");
      if (rowError) {
        rowError.textContent = message;
      }
    }

    function clearRowError(row) {
      row.classList.remove("has-error");
      const rowError = row.querySelector(".row-error");
      if (rowError) {
        rowError.textContent = "";
      }
    }

    function clearAllRowErrors() {
      Array.from(activityList.children).forEach(function (row) {
        clearRowError(row);
      });
    }

    function getStableColorIndex(value) {
      const text = String(value || "");
      let hash = 0;

      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }

      return Math.abs(hash) % 6;
    }

    function hashText(value) {
      const text = String(value || "");
      let hash = 0;

      for (let i = 0; i < text.length; i++) {
        hash = ((hash << 5) - hash) + text.charCodeAt(i);
        hash |= 0;
      }

      return hash;
    }

    function getUniqueActivityCountForMonth(year, month) {
      const unique = {};
      const totalDays = new Date(year, month + 1, 0).getDate();

      for (let day = 1; day <= totalDays; day++) {
        const dateKey = createDateKey(year, month, day);
        const activities = activitiesByDate[dateKey] || [];

        activities.forEach(function (activity) {
          unique[activity.sourceKey + "::" + activity.id] = true;
        });
      }

      return Object.keys(unique).length;
    }


    function getBacklogSourceKey(year) {
      return String(year) + "-unscheduled-notes";
    }


    function encodeBacklogNotesValue(notes) {
      return UNSCHEDULED_NOTES_PREFIX + JSON.stringify({
        version: 1,
        notes: normalizeBacklogNotes(notes)
      });
    }

    function parseBacklogNotesValue(value) {
      const text = String(value || "").trim();

      if (!text) {
        return [];
      }

      if (text.indexOf(UNSCHEDULED_NOTES_PREFIX) !== 0) {
        return text.split(/\r?\n+/).map(function (line, index) {
          const noteText = line.trim();
          return {
            id: "sheet_note_" + String(index + 1) + "_" + String(Math.abs(hashText(noteText))).slice(0, 10),
            text: noteText,
            createdAt: "",
            updatedAt: ""
          };
        }).filter(function (note) {
          return note.text.length > 0;
        });
      }

      try {
        const data = JSON.parse(text.slice(UNSCHEDULED_NOTES_PREFIX.length));
        return normalizeBacklogNotes(data && Array.isArray(data.notes) ? data.notes : []);
      } catch (error) {
        return [];
      }
    }

    function normalizeBacklogNotes(notes) {
      return (Array.isArray(notes) ? notes : [])
        .map(function (note) {
          return {
            id: note && note.id ? String(note.id) : createActivityId(),
            text: String(note && note.text || "").trim(),
            createdAt: note && note.createdAt ? String(note.createdAt) : new Date().toISOString(),
            updatedAt: note && note.updatedAt ? String(note.updatedAt) : ""
          };
        })
        .filter(function (note) {
          return note.text.length > 0;
        });
    }

    function loadBacklogNotesForYear(year) {
      const sourceKey = getBacklogSourceKey(year);
      const hasSheetBacklogKey = Object.prototype.hasOwnProperty.call(notesByDate, sourceKey);
      const sheetValue = hasSheetBacklogKey ? String(notesByDate[sourceKey] || "") : "";
      backlogNotes = hasSheetBacklogKey ? parseBacklogNotesValue(sheetValue) : [];
    }

    function addBacklogNoteFromInput() {
      if (isBusy) {
        return;
      }

      const text = backlogNoteInput.value.trim();
      if (!text) {
        setStatus("Write a note first.", "warning");
        backlogNoteInput.focus();
        return;
      }

      backlogNotes.unshift({
        id: createActivityId(),
        text: text,
        createdAt: new Date().toISOString(),
        updatedAt: ""
      });

      backlogNoteInput.value = "";
      persistBacklogNotes("Note saved.");
    }

    function renderBacklogNotes() {
      if (!backlogNoteList || !backlogNoteCount) {
        return;
      }

      backlogNoteCount.textContent = String(backlogNotes.length);
      backlogNoteList.innerHTML = "";

      if (backlogNotes.length === 0) {
        const emptyMessage = document.createElement("div");
        emptyMessage.className = "backlog-note-empty";
        emptyMessage.textContent = "No notes.";
        backlogNoteList.appendChild(emptyMessage);
        return;
      }

      backlogNotes.forEach(function (note) {
        const card = document.createElement("div");
        card.className = "backlog-note-card";

        const textBlock = document.createElement("div");
        textBlock.className = "backlog-note-text";
        textBlock.textContent = note.text;
        card.appendChild(textBlock);

        const actions = document.createElement("div");
        actions.className = "backlog-note-actions";

        const editButton = document.createElement("button");
        editButton.type = "button";
        editButton.className = "backlog-schedule-btn";
        editButton.textContent = "Edit";
        editButton.title = "Edit this note without assigning a date.";
        editButton.addEventListener("click", function () {
          editBacklogNote(note.id);
        });
        actions.appendChild(editButton);

        const scheduleButton = document.createElement("button");
        scheduleButton.type = "button";
        scheduleButton.className = "backlog-schedule-btn";
        scheduleButton.textContent = "Schedule";
        scheduleButton.title = "Turn this note into a dated activity.";
        scheduleButton.addEventListener("click", function () {
          scheduleBacklogNote(note.id);
        });
        actions.appendChild(scheduleButton);

        const deleteButton = document.createElement("button");
        deleteButton.type = "button";
        deleteButton.className = "backlog-delete-btn";
        deleteButton.textContent = "Delete";
        deleteButton.addEventListener("click", function () {
          deleteBacklogNote(note.id);
        });
        actions.appendChild(deleteButton);

        card.appendChild(actions);
        backlogNoteList.appendChild(card);
      });
    }

    function persistBacklogNotes(successMessage) {
      if (isBusy) {
        return;
      }

      isBusy = true;
      addBacklogNoteButton.disabled = true;
      setStatus("Saving to Google Sheet...");

      const normalizedNotes = normalizeBacklogNotes(backlogNotes);
      const backlogSourceKey = getBacklogSourceKey(currentYear);
      const notesToSave = normalizedNotes.length > 0
        ? [{ dateKey: backlogSourceKey, note: encodeBacklogNotesValue(normalizedNotes) }]
        : [];
      const dateKeysToDelete = normalizedNotes.length > 0 ? [] : [backlogSourceKey];

      saveAndConfirmPlannerChanges(notesToSave, dateKeysToDelete)
        .then(function () {
          isBusy = false;
          addBacklogNoteButton.disabled = false;
          renderCalendar(currentYear);
          setStatus(successMessage || "Note saved and confirmed in Google Sheet.", "success");
        })
        .catch(function (error) {
          isBusy = false;
          addBacklogNoteButton.disabled = false;
          setStatus("Google Sheet save failed: " + error.message, "error");
          loadNotesForYear(currentYear, true);
        });
    }

    function editBacklogNote(noteId) {
      if (isBusy) {
        return;
      }

      const note = backlogNotes.find(function (item) {
        return item.id === noteId;
      });

      if (!note) {
        setStatus("Could not find that note.", "error");
        return;
      }

      const nextText = window.prompt("Edit unscheduled note", note.text);
      if (nextText === null) {
        return;
      }

      const trimmedText = nextText.trim();
      if (!trimmedText) {
        setStatus("Note is empty.", "warning");
        return;
      }

      note.text = trimmedText;
      note.updatedAt = new Date().toISOString();
      persistBacklogNotes("Note updated.");
    }

    function deleteBacklogNote(noteId) {
      if (isBusy) {
        return;
      }

      const note = backlogNotes.find(function (item) {
        return item.id === noteId;
      });

      if (!note) {
        setStatus("Could not find that note.", "error");
        return;
      }

      if (!window.confirm("Delete this unscheduled note?")) {
        return;
      }

      backlogNotes = backlogNotes.filter(function (item) {
        return item.id !== noteId;
      });

      persistBacklogNotes("Note deleted.");
    }

    function scheduleBacklogNote(noteId) {
      if (isBusy || !modalBg.hidden) {
        return;
      }

      const note = backlogNotes.find(function (item) {
        return item.id === noteId;
      });

      if (!note) {
        setStatus("Could not find that note.", "error");
        return;
      }

      const todayKey = getTodayDateKey();
      selectedDateKey = todayKey;
      selectedSourceKeys = [];
      pendingScheduledBacklogNoteId = noteId;

      modalDate.textContent = "Edit / Schedule Note";
      activityList.innerHTML = "";

      addActivityRow({
        id: createActivityId(),
        title: note.text,
        start: "",
        end: "",
        completed: false,
        originalSourceKey: ""
      });

      showModalAndFocus();
      setStatus("Edit the text and save with blank dates to keep it as a note, or choose dates to schedule it.", "success");
    }

    function formatBacklogTimestamp(value) {
      if (!value) {
        return "recently";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return "recently";
      }

      return date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric",
        year: "numeric"
      });
    }

    function renderPendingActivitiesSidebar() {
      if (!pendingActivityList || !pendingActivityCount) {
        return;
      }

      const pendingActivities = getPendingActivities();
      pendingActivityCount.textContent = String(pendingActivities.length);
      pendingActivityList.innerHTML = "";

      if (pendingActivities.length === 0) {
        const emptyMessage = document.createElement("div");
        emptyMessage.className = "pending-activity-empty";
        emptyMessage.textContent = "No open activities.";
        pendingActivityList.appendChild(emptyMessage);
        return;
      }

      pendingActivities.forEach(function (activity) {
        const card = document.createElement("div");
        card.className = "pending-activity-card";
        card.title = "Open activity: " + activity.title;

        const topRow = document.createElement("div");
        topRow.className = "pending-activity-top";

        const openButton = document.createElement("button");
        openButton.type = "button";
        openButton.className = "pending-activity-open";
        openButton.textContent = activity.title;
        openButton.setAttribute("aria-label", "Open activity " + activity.title);
        openButton.addEventListener("click", function () {
          if (isBusy || !modalBg.hidden) {
            return;
          }

          const todayKey = getTodayDateKey();
          const dateToOpen = dateKeyInRange(todayKey, activity.start, activity.end)
            ? todayKey
            : activity.start;

          openModalForDate(dateToOpen);
        });

        topRow.appendChild(openButton);

        const completeButton = document.createElement("button");
        completeButton.type = "button";
        completeButton.className = "pending-complete-btn";
        completeButton.textContent = "";
        completeButton.setAttribute("aria-label", "Mark " + activity.title + " as completed");
        completeButton.setAttribute("title", "Mark as done");
        completeButton.addEventListener("click", function () {
          markActivityCompletedFromSidebar(activity, completeButton);
        });

        topRow.appendChild(completeButton);
        card.appendChild(topRow);

        const meta = document.createElement("div");
        meta.className = "pending-activity-meta";

        const statusPill = document.createElement("span");
        statusPill.className = "pending-pill " + activity.statusClass;
        statusPill.textContent = activity.statusText;
        meta.appendChild(statusPill);

        const remaining = document.createElement("span");
        remaining.className = "pending-activity-remaining";
        remaining.textContent = activity.remainingText;
        meta.appendChild(remaining);

        card.appendChild(meta);

        const dates = document.createElement("div");
        dates.className = "pending-activity-dates";
        dates.textContent = formatShortDateKey(activity.start) + " → " + formatShortDateKey(activity.end);
        card.appendChild(dates);

        const duration = document.createElement("div");
        duration.className = "pending-activity-duration";
        duration.textContent = "Total duration: " + formatActivityDuration(activity.start, activity.end);
        card.appendChild(duration);

        pendingActivityList.appendChild(card);
      });
    }

    function markActivityCompletedFromSidebar(activity, button) {
      if (isBusy || !activity || !activity.sourceKey) {
        return;
      }

      const parsed = parseStoredValue(notesByDate[activity.sourceKey], activity.sourceKey);
      if (parsed.type !== "activities") {
        setStatus("Could not find that activity record to update.", "error");
        return;
      }

      let didUpdate = false;
      const updatedActivities = parsed.activities.map(function (storedActivity) {
        const normalizedActivity = normalizeActivityDates(storedActivity, activity.sourceKey);

        if (normalizedActivity.id === activity.id) {
          didUpdate = true;
          return {
            id: normalizedActivity.id,
            title: normalizedActivity.title,
            start: normalizedActivity.start,
            end: normalizedActivity.end,
            completed: true
          };
        }

        return {
          id: normalizedActivity.id,
          title: normalizedActivity.title,
          start: normalizedActivity.start,
          end: normalizedActivity.end,
          completed: normalizedActivity.completed
        };
      });

      if (!didUpdate) {
        setStatus("Could not find that activity in the saved group.", "error");
        return;
      }

      isBusy = true;
      if (button) {
        button.disabled = true;
        button.setAttribute("aria-label", "Saving completion status");
        button.setAttribute("title", "Saving");
      }

      setStatus("Saving...");

      const completedNoteValue = encodeActivitiesValue(updatedActivities);
      const notesToSave = [{ dateKey: activity.sourceKey, note: completedNoteValue }];

      saveAndConfirmPlannerChanges(notesToSave, [])
        .then(function () {
          isBusy = false;
          renderCalendar(currentYear);
          setStatus("Done and confirmed in Google Sheet.", "success");
        })
        .catch(function (error) {
          isBusy = false;
          if (button) {
            button.disabled = false;
            button.textContent = "";
            button.setAttribute("aria-label", "Mark " + activity.title + " as completed");
            button.setAttribute("title", "Mark as done");
          }
          setStatus(error.message, "error");
        });
    }

    function getPendingActivities() {
      const todayKey = getTodayDateKey();
      const unique = {};
      const pendingActivities = [];

      getAllActivityRecords().forEach(function (record) {
        record.activities.forEach(function (activity) {
          const normalizedActivity = normalizeActivityDates(activity, record.sourceKey);

          if (!normalizedActivity.title || !normalizedActivity.start || !normalizedActivity.end) {
            return;
          }

          if (compareDateKeys(normalizedActivity.end, normalizedActivity.start) < 0) {
            return;
          }

          if (normalizedActivity.completed) {
            return;
          }

          const uniqueKey = record.sourceKey + "::" + normalizedActivity.id;
          if (unique[uniqueKey]) {
            return;
          }

          unique[uniqueKey] = true;

          const daysLeft = getDaysUntilDate(normalizedActivity.end);
          const isOverdue = daysLeft < 0;
          const isUpcoming = compareDateKeys(normalizedActivity.start, todayKey) > 0;
          const isDueToday = daysLeft === 0;

          pendingActivities.push({
            sourceKey: record.sourceKey,
            id: normalizedActivity.id,
            title: normalizedActivity.title,
            start: normalizedActivity.start,
            end: normalizedActivity.end,
            daysLeft: daysLeft,
            statusText: isOverdue ? "Overdue" : (isDueToday ? "Due today" : (isUpcoming ? "Upcoming" : "Active")),
            statusClass: isOverdue ? "overdue" : (isDueToday ? "due-today" : (isUpcoming ? "upcoming" : "active")),
            remainingText: formatDaysLeft(daysLeft)
          });
        });
      });

      pendingActivities.sort(function (a, b) {
        const endComparison = compareDateKeys(a.end, b.end);
        if (endComparison !== 0) {
          return endComparison;
        }

        const startComparison = compareDateKeys(a.start, b.start);
        if (startComparison !== 0) {
          return startComparison;
        }

        return a.title.localeCompare(b.title);
      });

      return pendingActivities;
    }

    function getTodayDateKey() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return dateToDateKey(today);
    }

    function getDaysUntilDate(dateKey) {
      if (!isValidDateKey(dateKey)) {
        return 0;
      }

      const today = dateKeyToDate(getTodayDateKey());
      const target = dateKeyToDate(dateKey);
      const difference = target.getTime() - today.getTime();

      return Math.ceil(difference / 86400000);
    }

    function formatDaysLeft(dayCount) {
      if (dayCount < 0) {
        const overdueDays = Math.abs(dayCount);
        return String(overdueDays) + " " + (overdueDays === 1 ? "day" : "days") + " overdue";
      }

      if (dayCount === 0) {
        return "Due today";
      }

      return String(dayCount) + " " + (dayCount === 1 ? "day" : "days") + " left";
    }

    function formatShortDateKey(dateKey) {
      if (!isValidDateKey(dateKey)) {
        return dateKey || "";
      }

      const date = dateKeyToDate(dateKey);
      return monthNames[date.getMonth()].slice(0, 3) + " " + String(date.getDate()) + ", " + String(date.getFullYear());
    }


    function getThailandHolidaysForDate(dateKey) {
      if (!isValidDateKey(dateKey)) {
        return [];
      }

      const parts = dateKey.split("-");
      const year = parts[0];
      const month = Number(parts[1]);
      const day = Number(parts[2]);
      const names = [];
      const seen = {};

      function addHolidayName(name) {
        if (!name || seen[name]) {
          return;
        }

        names.push(name);
        seen[name] = true;
      }

      (THAILAND_HOLIDAYS_BY_YEAR[year] && THAILAND_HOLIDAYS_BY_YEAR[year][dateKey] || []).forEach(addHolidayName);

      THAILAND_FIXED_HOLIDAYS.forEach(function (holiday) {
        if (holiday.month === month && holiday.day === day) {
          addHolidayName(holiday.name);
        }
      });

      return names;
    }

    function getHolidaySummaryForDate(dateKey) {
      const holidays = getThailandHolidaysForDate(dateKey);

      if (holidays.length === 0) {
        return "";
      }

      return ". Thailand holiday: " + holidays.join(", ") + ".";
    }

    function getActivitySummaryForDate(dateKey) {
      const activities = activitiesByDate[dateKey] || [];

      if (activities.length === 0) {
        return ". No activities.";
      }

      return ". Activities: " + activities.map(function (activity) {
        const durationText = formatActivityDuration(activity.start, activity.end);
        return activity.title + (durationText ? " (" + durationText + ")" : "");
      }).join(", ") + ".";
    }

    function getHiddenActivityTitles(activities) {
      return activities.map(function (activity) {
        const durationText = formatActivityDuration(activity.start, activity.end);
        return activity.title + " (" + activity.start + " to " + activity.end + (durationText ? ", " + durationText : "") + ")";
      }).join("\n");
    }

    function applySearchHighlight(showStatusMessage) {
      const term = activitySearchTerm;
      let matchedDays = 0;
      let matchedActivities = 0;

      Object.keys(dateCellByKey).forEach(function (dateKey) {
        const cell = dateCellByKey[dateKey];
        const activities = activitiesByDate[dateKey] || [];

        cell.classList.remove("search-match");
        cell.classList.remove("search-dim");

        if (!term) {
          return;
        }

        const matches = activities.filter(function (activity) {
          return activity.title.toLowerCase().indexOf(term) !== -1;
        });

        if (matches.length > 0) {
          cell.classList.add("search-match");
          matchedDays += 1;
          matchedActivities += matches.length;
        } else if (activities.length > 0) {
          cell.classList.add("search-dim");
        }
      });

      if (showStatusMessage) {
        if (!term) {
          setStatus("Search cleared.", "success");
        } else if (matchedActivities > 0) {
          setStatus(
            "Matches: " + matchedActivities + ". Days: " + matchedDays + ".",
            "success"
          );
        } else {
          setStatus("No matches.", "warning");
        }
      }
    }

    function setLocalNote(sourceKey, value) {
      notesByDate[sourceKey] = value;
      activityRecordsCache = null;

      const year = Number(String(sourceKey).slice(0, 4));
      if (!Number.isInteger(year)) {
        return;
      }

      if (!notesCacheByYear[year]) {
        notesCacheByYear[year] = {};
      }

      notesCacheByYear[year][sourceKey] = value;
    }

    function removeLocalNote(sourceKey) {
      delete notesByDate[sourceKey];
      activityRecordsCache = null;

      const year = Number(String(sourceKey).slice(0, 4));
      if (Number.isInteger(year) && notesCacheByYear[year]) {
        delete notesCacheByYear[year][sourceKey];
      }
    }

    function callAppsScript(action, params) {
      return new Promise(function (resolve, reject) {
        const callbackName =
          "jsonpCallback_" +
          Date.now() +
          "_" +
          Math.random().toString(36).slice(2);

        const url = new URL(APPS_SCRIPT_URL);
        url.searchParams.set("action", action);
        url.searchParams.set("callback", callbackName);
        url.searchParams.set("_cacheBust", String(Date.now()));

        Object.keys(params || {}).forEach(function (key) {
          url.searchParams.set(key, params[key]);
        });

        let didCleanUp = false;

        const timeout = window.setTimeout(function () {
          cleanup();

          reject(new Error(
            "Apps Script did not respond within 20 seconds. Check the deployment URL, access permission, or backend error logs."
          ));
        }, 20000);

        window[callbackName] = function (payload) {
          cleanup();

          if (!payload || payload.ok !== true) {
            const message =
              payload && payload.error
                ? payload.error
                : "Apps Script returned an error.";
            reject(new Error(message));
            return;
          }

          resolve(payload);
        };

        const script = document.createElement("script");
        script.async = true;
        script.src = url.toString();

        script.onerror = function () {
          cleanup();

          reject(new Error(
            "Browser could not load Apps Script. Check the /exec URL and deployment permission."
          ));
        };

        document.body.appendChild(script);

        function cleanup() {
          if (didCleanUp) {
            return;
          }

          didCleanUp = true;
          window.clearTimeout(timeout);
          delete window[callbackName];

          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
      });
    }

    document.addEventListener("visibilitychange", function () {
      if (!document.hidden) {
        syncSheetEditsFromBackend(true);
      }
    });

    window.addEventListener("focus", function () {
      syncSheetEditsFromBackend(true);
    });

    loadNotesForYear(currentYear, false).then(function () {
      hasInitialLoadCompleted = true;
      startSheetAutoSync();
      scrollCurrentMonthIntoView("auto");
    });
  </script>
